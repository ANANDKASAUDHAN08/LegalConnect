events {
  worker_connections 1024;
}

http {
  server {
    listen 80;

    # Route /api/auth/* → Dotnet Core API (port 5001)
    location /api/auth {
      proxy_pass http://host.docker.internal:5001;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Route /api/bookmark/* → Dotnet Core API (port 5001)
    location /api/bookmark {
      proxy_pass http://host.docker.internal:5001;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Route /api/lawyer/* → Dotnet Core API (port 5001)
    location /api/lawyer {
      proxy_pass http://host.docker.internal:5001;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Route /api/consultation/* → Dotnet Core API (port 5001)
    location /api/consultation {
      proxy_pass http://host.docker.internal:5001;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Route /api/review/* → Dotnet Core API (port 5001)
    location /api/review {
      proxy_pass http://host.docker.internal:5001;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Route /uploads/* → Dotnet Core static files (port 5001)
    location /uploads {
      proxy_pass http://host.docker.internal:5001;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Route /api/legal/* → Node.js API (port 5000)
    location /api/legal {
      proxy_pass http://host.docker.internal:5000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Route /api/lawyers/* → Node.js API (port 5000)
    location /api/lawyers {
      proxy_pass http://host.docker.internal:5000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health check for the gateway itself
    location /gateway/health {
      return 200 '{"status":"API Gateway is running"}';
      add_header Content-Type application/json;
    }
  }
}
