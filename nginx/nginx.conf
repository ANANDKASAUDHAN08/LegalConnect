events {
  worker_connections 1024;
}

http {
  client_max_body_size 50M;

  # Gzip Compression Configuration
  gzip on;
  gzip_disable "msie6";
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_buffers 16 8k;
  gzip_http_version 1.1;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    text/js
    text/xml
    text/javascript
    application/javascript
    application/x-javascript
    application/json
    application/xml
    application/xml+rss;

  server {
    listen 80;

    # Route /api/auth/* → Dotnet Core API (port 5001)
    location /api/auth {
      proxy_pass http://host.docker.internal:5001;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Route /api/bookmark/* → Dotnet Core API (port 5001)
    location /api/bookmark {
      proxy_pass http://host.docker.internal:5001;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Route /api/notes/* → Dotnet Core API (port 5001)
    location /api/notes {
      proxy_pass http://host.docker.internal:5001;
      proxy_http_version 1.1;
