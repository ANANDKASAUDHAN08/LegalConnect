<div class="auth-page min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
  <div class="bg-orb bg-orb-1 opacity-10"></div>
  <div class="auth-card card p-10 md:p-12 w-full max-w-[440px] flex flex-col gap-7 relative z-10">
    <div class="auth-header flex flex-col gap-2">
      <a routerLink="/" class="auth-brand no-underline font-extrabold text-[1.1rem] text-white mb-2 block">⚖️ LegalConnect</a>
      <h1 class="auth-title font-serif text-[2rem] text-white leading-tight">Welcome Back</h1>
      <p class="auth-subtitle text-slate-400">Sign in to your account</p>
    </div>
    
    <form class="auth-form flex flex-col gap-5" (ngSubmit)="onSubmit()">
      <div class="form-group flex flex-col gap-1.5">
        <label class="form-label text-[0.875rem] font-medium text-slate-400" for="login-email">Email Address</label>
        <input id="login-email" type="email" class="form-control" placeholder="you@example.com" [(ngModel)]="email" name="email" required>
      </div>
      <div class="form-group flex flex-col gap-1.5">
        <label class="form-label text-[0.875rem] font-medium text-slate-400" for="login-password">Password</label>
        <input id="login-password" type="password" class="form-control" placeholder="••••••••" [(ngModel)]="password" name="password" required>
      </div>
      
      <div *ngIf="error" class="error-msg text-red-400 text-[0.875rem] p-3.5 bg-red-400/10 rounded-lg border border-red-400/20">
        ⚠️ {{ error }}
      </div>
      
      <button id="login-submit" type="submit" class="btn btn-primary w-full py-3.5" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>
    
    <p class="auth-footer text-center text-slate-400 text-[0.9rem]">
      Don't have an account? <a routerLink="/register" class="auth-link text-primary-light font-semibold no-underline hover:underline">Create one</a>
    </p>
  </div>
</div>
