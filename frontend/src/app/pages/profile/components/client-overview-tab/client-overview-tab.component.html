<div class="space-y-6 animate-[fadeIn_0.35s_ease-out]">

  <!-- Greeting Banner -->
  <div
    class="p-5 rounded-xl bg-gradient-to-br from-white to-slate-50/50 dark:from-slate-900/60 dark:to-slate-900/30 border border-slate-200/50 dark:border-slate-800/80 shadow-[0_4px_20px_rgba(15,23,42,0.015)] dark:shadow-none border-l-4 border-l-blue-500">
    <h2 class="text-lg md:text-xl font-bold text-slate-900 dark:text-white">Hello, {{ getFirstName() }}!</h2>
    <p class="text-[11px] md:text-sm text-slate-500 dark:text-slate-400 mt-1">Welcome to your LegalConnect dashboard.
    </p>
  </div>

  <!-- Stat Cards Grid -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-3 sm:gap-4">
    <div *ngFor="let card of statCards" [class]="'flex items-center gap-3 sm:gap-4 p-3.5 sm:p-5 rounded-xl bg-white dark:bg-slate-900/60 border border-slate-200/50 dark:border-slate-800/80 shadow-[0_4px_20px_rgba(15,23,42,0.015)] dark:shadow-none hover:shadow-[0_8px_30px_rgba(15,23,42,0.06)] hover:-translate-y-0.5 transition-all duration-300 group ' +
               (card.key === 'consultations' ? 'hover:border-purple-500/30 hover:shadow-purple-500/5' :
                card.key === 'upcoming' ? 'hover:border-blue-500/30 hover:shadow-blue-500/5' :
                card.key === 'memberSince' ? 'hover:border-emerald-500/30 hover:shadow-emerald-500/5' :
                'hover:border-amber-500/30 hover:shadow-amber-500/5')" class="transition-all duration-200">
      <!-- Icon -->
      <div
        class="w-8 h-8 sm:w-10 sm:h-10 rounded-lg flex items-center justify-center flex-shrink-0 transition-transform duration-200 group-hover:scale-110"
        [class]="card.iconBg">
        <svg class="w-4 h-4 sm:w-5 sm:h-5" [class]="card.iconColor" fill="none" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.8">
          <path *ngIf="card.key === 'consultations'" stroke-linecap="round" stroke-linejoin="round"
            d="M15 10l4.553-2.069A1 1 0 0121 8.845v6.31a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
          <path *ngIf="card.key === 'upcoming'" stroke-linecap="round" stroke-linejoin="round"
            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
          <path *ngIf="card.key === 'memberSince'" stroke-linecap="round" stroke-linejoin="round"
            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
          <path *ngIf="card.key === 'profile'" stroke-linecap="round" stroke-linejoin="round"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
      </div>
      <!-- Text -->
      <div class="min-w-0">
        <p
          class="text-[9px] sm:text-[10px] font-bold uppercase tracking-wide sm:tracking-widest text-slate-450 dark:text-slate-500 break-words leading-tight">
          {{ card.label }}</p>
        <p *ngIf="!loadingStats || card.key === 'memberSince' || card.key === 'profile'"
          class="text-base sm:text-lg font-extrabold mt-0.5 leading-tight" [class]="getStatValueClass(card.key)">
          {{ getStatValue(card.key) }}
        </p>
        <div *ngIf="loadingStats && card.key !== 'memberSince' && card.key !== 'profile'"
          class="h-5 w-14 bg-slate-100 dark:bg-slate-800 rounded-lg animate-pulse mt-0.5"></div>
      </div>
    </div>

  </div>

  <!-- Quick Access -->
  <div class="space-y-3">
    <h3 class="text-xs font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500 px-1">Quick Access</h3>
    <div
      class="divide-y divide-slate-100 dark:divide-slate-800 rounded-xl bg-white dark:bg-slate-900/60 border border-slate-200/50 dark:border-slate-800/80 shadow-[0_4px_20px_rgba(15,23,42,0.015)] dark:shadow-none overflow-hidden">
      <button *ngFor="let item of quickAccessItems" (click)="goTo(item.tab)"
        class="w-full flex items-center justify-between gap-4 p-4 hover:bg-slate-50/60 dark:hover:bg-slate-800/30 transition-all duration-200 text-left group">
        <div class="flex items-center gap-3.5">
          <!-- Icon circle -->
          <div class="w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0" [class]="item.bgColor">
            <svg class="w-5 h-5" [class]="item.color" fill="none" viewBox="0 0 24 24" stroke="currentColor"
              stroke-width="2">
              <path *ngIf="item.tab === 'profile-details'" stroke-linecap="round" stroke-linejoin="round"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              <path *ngIf="item.tab === 'activity-log'" stroke-linecap="round" stroke-linejoin="round"
                d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
              <path *ngIf="item.tab === 'security'" stroke-linecap="round" stroke-linejoin="round"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              <path *ngIf="item.tab === 'my-reviews'" stroke-linecap="round" stroke-linejoin="round"
                d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.907c.961 0 1.36 1.24.588 1.81l-3.97 2.883a1 1 0 00-.364 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.971-2.883a1 1 0 00-1.175 0l-3.97 2.883c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.364-1.118L2.98 10.1c-.773-.57-.375-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
            </svg>
          </div>
          <div>
            <p class="text-sm font-semibold text-slate-800 dark:text-slate-200">{{ item.label }}</p>
            <p class="text-[11px] text-slate-400 dark:text-slate-550">{{ item.description }}</p>
          </div>
        </div>
        <!-- Chevron -->
        <svg
          class="w-4 h-4 text-slate-350 dark:text-slate-600 group-hover:text-slate-550 dark:group-hover:text-slate-400 group-hover:translate-x-1 flex-shrink-0 transition-all duration-200"
          fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
        </svg>
      </button>
    </div>
  </div>

</div>
