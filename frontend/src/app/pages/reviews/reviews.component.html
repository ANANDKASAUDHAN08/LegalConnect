<section class="min-h-screen bg-slate-50/30 dark:bg-slate-950/40 py-20 px-4 sm:px-6 lg:px-8">
  <div class="max-w-6xl mx-auto">

    <!-- Navigation Back Link & Header -->
    <div class="mb-10 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
      <div>
        <a routerLink="/home"
          class="inline-flex items-center gap-1.5 text-xs font-bold text-blue-600 dark:text-blue-400 hover:underline mb-2">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
          </svg>
          Back to Home
        </a>
        <h1 class="text-2xl md:text-3xl font-extrabold text-slate-850 dark:text-white tracking-tight">
          Community Testimonials
        </h1>
        <p class="text-sm text-slate-500 dark:text-slate-400 mt-1 max-w-xl">
          Browse verified reviews, search details, filter by ratings, and share your own experiences using the
          LegalConnect portal.
        </p>
      </div>

      <div class="hidden md:flex self-start md:self-center">
        <button (click)="openWriteModal()"
          class="btn btn-inline py-2.5 px-3.5 md:px-5 text-xs font-bold flex items-center justify-center gap-1.5 rounded-xl transition-all shadow-md bg-blue-600 hover:bg-blue-700 text-white dark:bg-slate-800 dark:hover:bg-white dark:text-white dark:hover:text-slate-800">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.897L16.863 4.487zm0 0L19.5 7.125" />
          </svg>
          <span>Write a Review</span>
        </button>
      </div>
    </div>

    <!-- Search & Filter Controls -->
    <div
      class="bg-white/60 dark:bg-slate-900/60 border border-slate-200/50 dark:border-slate-800/80 p-5 rounded-2xl shadow-sm mb-8 flex flex-col gap-4">
      <div class="grid grid-cols-1 md:grid-cols-12 gap-4 items-center">
        <!-- Search bar -->
        <div class="md:col-span-6 relative">
          <input type="text" [(ngModel)]="searchText" (ngModelChange)="applyFilters()"
            placeholder="Search by keywords, author, or subject..."
            class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-white/70 dark:bg-slate-950 text-slate-800 dark:text-slate-200 placeholder-slate-400 dark:placeholder-slate-500 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-xs shadow-sm">
          <div class="absolute left-3.5 top-3 text-slate-400 dark:text-slate-500">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
            </svg>
          </div>
        </div>

        <!-- Rating Filter -->
        <div class="md:col-span-3 relative rating-dropdown-container">
          <button type="button" (click)="showRatingDropdown = !showRatingDropdown"
            class="w-full px-3.5 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-white/70 dark:bg-slate-950 text-slate-800 dark:text-slate-200 outline-none focus:border-blue-500 text-xs shadow-sm flex items-center justify-between transition-all select-none">
            <span class="font-medium text-slate-700 dark:text-slate-300">{{ getSelectedRating() }}</span>
            <svg class="w-3.5 h-3.5 text-slate-400 transition-transform duration-200"
              [class.rotate-180]="showRatingDropdown" fill="none" stroke="currentColor" stroke-width="2.5"
              viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
            </svg>
          </button>

          <!-- Dropdown Menu -->
          <div *ngIf="showRatingDropdown"
            class="absolute z-50 left-0 right-0 mt-1.5 bg-white/95 dark:bg-slate-900/95 border border-slate-200/60 dark:border-slate-800/80 rounded-xl shadow-lg backdrop-blur-md overflow-hidden animate-fade-in-up py-1">
            <button *ngFor="let opt of ratingOptions" type="button"
              (click)="ratingFilter = opt.value; applyFilters(); showRatingDropdown = false"
              [ngClass]="ratingFilter === opt.value ? 'bg-blue-50/50 dark:bg-blue-500/10' : ''"
              class="w-full text-left px-4 py-2.5 text-xs text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800/60 transition-colors flex items-center justify-between">
              <span class="font-medium">{{ opt.label }}</span>
              <span *ngIf="opt.stars" class="text-amber-400 text-[10px] tracking-wider">{{ opt.stars }}</span>
            </button>
          </div>
        </div>

        <!-- Role Type Filter -->
        <div class="md:col-span-3">
          <div
            class="grid grid-cols-3 gap-1 p-1 rounded-xl bg-slate-100/60 dark:bg-slate-950/40 border border-slate-200/20 dark:border-slate-800/40">
            <button (click)="roleFilter = 'all'; applyFilters()"
              [class]="roleFilter === 'all' ? 'bg-white dark:bg-slate-850 text-blue-600 dark:text-blue-400 shadow-xs font-bold' : 'text-slate-500 hover:text-slate-800 dark:hover:text-white'"
              class="py-1.5 px-2 rounded-xl text-[10px] transition-all text-center">
              All
            </button>
            <button (click)="roleFilter = 'Client'; applyFilters()"
              [class]="roleFilter === 'Client' ? 'bg-white dark:bg-slate-850 text-blue-600 dark:text-blue-400 shadow-xs font-bold' : 'text-slate-500 hover:text-slate-800 dark:hover:text-white'"
              class="py-1.5 px-2 rounded-xl text-[10px] transition-all text-center">
              Clients
            </button>
            <button (click)="roleFilter = 'Lawyer'; applyFilters()"
              [class]="roleFilter === 'Lawyer' ? 'bg-white dark:bg-slate-850 text-blue-600 dark:text-blue-400 shadow-xs font-bold' : 'text-slate-500 hover:text-slate-800 dark:hover:text-white'"
              class="py-1.5 px-2 rounded-xl text-[10px] transition-all text-center">
              Lawyers
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Reviews Grid -->
    <div *ngIf="filteredReviews.length > 0; else noReviews" class="reviews-grid-container flex flex-col gap-8">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-6">
        <!-- Review Card -->
        <app-review-card *ngFor="let rev of paginatedReviews"
          [review]="rev"
          [currentUser]="currentUser"
          [showReadMore]="false"
          [highlightGlow]="highlightedReviewId === rev.id"
          (edit)="openEditModal($event)"
          (delete)="onDeleteReview($event)"
          (like)="likeReview($event)">
        </app-review-card>
      </div>

      <!-- Pagination Controls -->
      <div *ngIf="filteredReviews.length > pageSize" class="flex items-center justify-center gap-1.5 mt-4 sm:mt-6">
        <!-- Previous Page -->
        <button (click)="prevPage()" [disabled]="currentPage === 1"
          class="flex items-center justify-center p-2 rounded-lg border border-slate-200/60 dark:border-slate-800/80 bg-white/70 dark:bg-slate-900/60 text-slate-600 dark:text-slate-400 hover:text-blue-650 dark:hover:text-blue-400 hover:border-blue-500/20 disabled:opacity-40 disabled:hover:text-slate-600 dark:disabled:hover:text-slate-400 disabled:hover:border-slate-200/60 dark:disabled:hover:border-slate-800/80 transition-all outline-none shadow-xs cursor-pointer disabled:cursor-not-allowed">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
          </svg>
        </button>

        <!-- Page Numbers -->
        <div class="flex items-center gap-1">
          <button *ngFor="let page of getPageNumbers()" (click)="goToPage(page)"
            [class]="currentPage === page 
              ? 'bg-blue-600 dark:bg-blue-500 text-white font-extrabold shadow-sm border-blue-600' 
              : 'bg-white/70 dark:bg-slate-900/60 text-slate-600 dark:text-slate-450 border-slate-200/60 dark:border-slate-800/80 hover:text-slate-800 dark:hover:text-white hover:border-slate-350 dark:hover:border-slate-655'"
            class="w-8 h-8 rounded-lg border text-xs font-bold transition-all outline-none flex items-center justify-center cursor-pointer">
            {{ page }}
          </button>
        </div>

        <!-- Next Page -->
        <button (click)="nextPage()" [disabled]="currentPage === totalPages"
          class="flex items-center justify-center p-2 rounded-lg border border-slate-200/60 dark:border-slate-800/80 bg-white/70 dark:bg-slate-900/60 text-slate-600 dark:text-slate-400 hover:text-blue-655 dark:hover:text-blue-400 hover:border-blue-500/20 disabled:opacity-40 disabled:hover:text-slate-600 dark:disabled:hover:text-slate-400 disabled:hover:border-slate-200/60 dark:disabled:hover:border-slate-800/80 transition-all outline-none shadow-xs cursor-pointer disabled:cursor-not-allowed">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Empty State -->
    <ng-template #noReviews>
      <div class="text-center py-20 flex flex-col items-center gap-3">
        <span class="text-5xl">🔍</span>
        <h3 class="font-bold text-slate-800 dark:text-white text-base">No reviews match your filters</h3>
        <p class="text-xs text-slate-450 max-w-sm">Try modifying your search text, star ratings, or client/advocate type
          filters to find reviews.</p>
        <button (click)="searchText = ''; ratingFilter = 'all'; roleFilter = 'all'; applyFilters()"
          class="btn btn-outline btn-sm text-xs mt-2">Clear Filters</button>
      </div>
    </ng-template>

    <!-- Shared Review Write/Edit Modal Component -->
    <app-write-review-modal *ngIf="showWriteModal" [currentUser]="currentUser" [reviewToEdit]="editModeReview"
      [navbarHeight]="navbarHeight" (close)="closeWriteModal()" (saved)="onReviewSaved($event)">
    </app-write-review-modal>

    <!-- Floating Action Button (FAB) for Mobile View Only -->
    <button (click)="openWriteModal()"
      class="fixed bottom-6 right-6 md:hidden z-40 bg-blue-600 hover:bg-blue-700 text-white dark:bg-slate-800 dark:hover:bg-white dark:text-white dark:hover:text-slate-800 w-14 h-14 rounded-full shadow-2xl transition-all duration-300 transform hover:scale-110 active:scale-95 flex items-center justify-center border border-slate-200/20 dark:border-slate-700/30"
      aria-label="Write a Review">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.897L16.863 4.487zm0 0L19.5 7.125" />
      </svg>
    </button>

  </div>
</section>
