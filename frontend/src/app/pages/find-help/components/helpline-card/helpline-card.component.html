<div
  class="bg-white dark:bg-slate-900 md:border-y md:border-r md:border-slate-200 md:dark:border-slate-800 border-l-4 border-l-amber-500 md:border-l-amber-500 md:dark:border-l-amber-500 rounded-2xl px-5 py-3 sm:p-4 shadow-none md:shadow-sm md:hover:shadow-md transition-all duration-300 animate-scale-up group relative overflow-hidden flex flex-col justify-between h-full">

  <div class="ml-0.5 sm:ml-1">
    <div class="flex items-center justify-between gap-2 mb-1 sm:mb-1.5">
      <span
        class="inline-flex items-center px-1.5 py-0.5 rounded text-[8.5px] font-black uppercase tracking-wider bg-amber-500/10 text-amber-600 dark:text-amber-450 border border-amber-500/20">
        Emergency Helpline
      </span>
    </div>
    <h3 class="text-xs sm:text-sm font-bold text-slate-800 dark:text-slate-100 m-0 leading-tight">{{helpline.name}}</h3>

    <p
      class="text-[11px] sm:text-xs font-bold text-slate-600 dark:text-slate-350 mt-1 sm:mt-1.5 m-0 flex items-center gap-1.5">
      <span>Number:</span>
      <a href="tel:{{helpline.number}}" [appTooltip]="'Call ' + helpline.name + ' directly at ' + helpline.number" tooltipPlacement="top"
        class="text-amber-550 dark:text-amber-400 hover:underline font-extrabold">{{helpline.number}}</a>
    </p>

    <p class="text-[10px] sm:text-[11px] text-slate-400 dark:text-slate-500 mt-0.5 sm:mt-1 m-0 leading-relaxed">
      {{helpline.description}}</p>
  </div>

  <!-- Divider -->
  <div class="border-t border-slate-100 dark:border-slate-800/80 my-2 sm:my-3"></div>

  <!-- Action buttons -->
  <div class="flex items-center justify-between gap-2 sm:gap-3 ml-0.5 sm:ml-1 w-full">
    <!-- Primary Dialer -->
    <a href="tel:{{helpline.number}}" [appTooltip]="'Dial emergency helpline ' + helpline.number" tooltipPlacement="top"
      class="bg-amber-500 hover:bg-amber-600 text-white text-[11px] sm:text-xs font-bold py-1 px-2.5 sm:py-1.5 sm:px-3.5 rounded-lg sm:rounded-xl transition-all hover:scale-105 inline-flex items-center justify-center gap-1.5 no-underline shadow-sm flex-grow sm:flex-initial text-center">
      <svg class="w-3 h-3 sm:w-3.5 sm:h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"
          d="M3 5a2 2 0 012-2h3.28a1 1 0 01.94.725l.548 2.2a1 1 0 01-.321.988l-1.305.98a10.582 10.582 0 004.872 4.872l.98-1.305a1 1 0 01.988-.321l2.2.548a1 1 0 01.725.94V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
      </svg>
      <span>Call</span>
    </a>

    <!-- Quick Actions (Save / WhatsApp Share / QR Display) -->
    <div class="flex items-center gap-1.5">
      <!-- Save / Bookmark Button -->
      <button (click)="onSaveClick($event)"
        class="p-1 sm:p-1.5 rounded-md sm:rounded-lg border cursor-pointer transition-all duration-200 flex items-center justify-center"
        [ngClass]="isSaved()
          ? 'border-amber-400/60 dark:border-amber-500/40 text-amber-500 bg-amber-50/70 dark:bg-amber-400/10'
          : 'border-amber-200/60 dark:border-amber-500/20 text-amber-600 dark:text-amber-400 bg-amber-50/50 dark:bg-amber-400/5 hover:bg-amber-100/50 dark:hover:bg-amber-400/15 hover:border-amber-300 dark:hover:border-amber-400/30'"
        [appTooltip]="isSaved() ? 'Remove from saved helplines' : 'Save helpline for quick access'"
        tooltipPlacement="top">
        <!-- Filled when saved -->
        <svg *ngIf="isSaved()" class="w-3 h-3 sm:w-3.5 sm:h-3.5 transition-all scale-110" fill="currentColor" viewBox="0 0 24 24">
          <path d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" />
        </svg>
        <!-- Outline when not saved -->
        <svg *ngIf="!isSaved()" class="w-3 h-3 sm:w-3.5 sm:h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" />
        </svg>
      </button>

      <!-- QR Code Scanner -->
      <button (click)="showQr.emit(helpline)"
        class="p-1 sm:p-1.5 rounded-md sm:rounded-lg border border-amber-200/60 dark:border-amber-500/20 text-amber-600 dark:text-amber-400 bg-amber-50/50 dark:bg-amber-400/5 hover:bg-amber-100/50 dark:hover:bg-amber-400/15 hover:border-amber-300 dark:hover:border-amber-400/30 cursor-pointer transition-all duration-200 flex items-center justify-center"
        [appTooltip]="'Generate QR code to scan and open on mobile'" tooltipPlacement="top">
        <svg class="w-3 h-3 sm:w-3.5 sm:h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h2M4 8h16" />
          <rect x="3" y="3" width="5" height="5" rx="1" stroke="currentColor" stroke-width="2" />
          <rect x="16" y="3" width="5" height="5" rx="1" stroke="currentColor" stroke-width="2" />
          <rect x="3" y="16" width="5" height="5" rx="1" stroke="currentColor" stroke-width="2" />
        </svg>
      </button>

      <!-- WhatsApp share -->
      <button (click)="share.emit(helpline)"
        class="p-1 sm:p-1.5 rounded-md sm:rounded-lg border border-emerald-250/60 dark:border-emerald-500/20 text-emerald-600 dark:text-emerald-400 bg-emerald-50/50 dark:bg-emerald-500/5 hover:bg-emerald-100/50 dark:hover:bg-emerald-500/10 hover:border-emerald-300 dark:hover:border-emerald-500/30 cursor-pointer transition-all duration-200 flex items-center justify-center"
        [appTooltip]="'Share helpline contact via WhatsApp'" tooltipPlacement="top">
        <svg class="w-3 h-3 sm:w-3.5 sm:h-3.5" fill="currentColor" viewBox="0 0 24 24">
          <path
            d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.746.953 3.71 1.455 5.703 1.455h.008c6.559 0 11.894-5.336 11.897-11.893a11.821 11.821 0 00-3.48-8.413z" />
        </svg>
      </button>
    </div>

  </div>

</div>
