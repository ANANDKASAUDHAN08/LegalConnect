<div class="card p-5 bg-bgSurface border-l-4 border-l-amber-500 transition-all animate-scale-up">
  <div class="flex flex-col md:flex-row justify-between items-stretch md:items-start gap-4">
    <div class="flex-1">
      <span class="badge badge-accent mb-1">Helpline</span>
      <h3 class="text-[17px] font-bold text-textPrimary m-0">{{helpline.name}}</h3>
      <p class="text-sm font-semibold text-slate-700 dark:text-slate-300 mt-1">Number: <a href="tel:{{helpline.number}}"
          class="hover:underline text-amber-500">{{helpline.number}}</a></p>
      <p class="text-xs text-slate-400 mt-1">{{helpline.description}}</p>
    </div>
    <div
      class="flex flex-row md:flex-col items-center md:items-end justify-between md:justify-start gap-4 pt-3 md:pt-0 border-t border-borderSubtle md:border-none">

          class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
