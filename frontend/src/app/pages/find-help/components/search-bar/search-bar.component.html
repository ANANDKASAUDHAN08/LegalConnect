<!-- Search Mode Switcher Tabs -->
<div class="flex items-center justify-start gap-3.5 mb-3 w-full" [class.px-1]="variant === 'mobile'">
  <div
    class="flex items-center bg-slate-100/50 dark:bg-slate-900/60 p-0.5 rounded-full border border-slate-200/40 dark:border-white/5 backdrop-blur-md"
    [class.p-1]="variant === 'desktop'">
    <!-- Keyword Search Button -->
    <button (click)="aiModeChange.emit(false)"
      [appTooltip]="variant === 'desktop' ? 'Search by keywords (e.g., divorce, rent)' : ''" tooltipPlacement="top"
      [ngClass]="!isAiMode ? 'bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200 shadow-sm font-bold' : 'bg-transparent text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-white'"
      [class]="variant === 'mobile' ? 'px-3 py-1.5 rounded-full text-[11px] font-bold transition-all duration-200 flex items-center justify-center gap-1 cursor-pointer border-0' : 'px-4 py-2 rounded-full text-xs font-bold transition-all duration-200 flex items-center justify-center gap-1.5 cursor-pointer border-0'">
      <svg [class]="variant === 'mobile' ? 'w-3 h-3' : 'w-3.5 h-3.5'" fill="none" stroke="currentColor"
        viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
      <span>{{ variant === 'mobile' ? 'Keyword' : 'Keyword Search' }}</span>
    </button>

    <!-- Ask AI Button -->
    <button (click)="aiModeChange.emit(true)"
      [appTooltip]="variant === 'desktop' ? 'Describe your legal situation in plain language' : ''"
      tooltipPlacement="top"
      [ngClass]="isAiMode ? 'bg-[#d97706] text-white shadow-sm font-bold active-ask-ai-tab' : 'bg-transparent text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-white'"
      [class]="variant === 'mobile' ? 'px-3 py-1.5 rounded-full text-[11px] font-bold transition-all duration-200 flex items-center justify-center gap-1 cursor-pointer border-0' : 'px-4 py-2 rounded-full text-xs font-bold transition-all duration-200 flex items-center justify-center gap-1.5 cursor-pointer border-0'">
      <svg [class]="variant === 'mobile' ? 'w-3 h-3' : 'w-3.5 h-3.5'" fill="currentColor" viewBox="0 0 20 20">
        <path
          d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
      </svg>
      <span>Ask AI</span>
    </button>
  </div>

  <span
    class="text-[10px] text-slate-400 dark:text-slate-500 font-bold uppercase tracking-wider flex items-center gap-1"
    [class]="variant === 'desktop' ? 'text-xs text-slate-400 dark:text-slate-550 font-semibold flex items-center gap-1.5' : ''">
    <span class="text-slate-350 dark:text-slate-700 font-bold">&bull;</span>
    {{ variant === 'mobile' ? 'English / हिंदी' : 'Ask in English / हिंदी' }}
  </span>
</div>

<!-- Unified Capsule Search Bar -->
<div class="relative w-full search-container-wrapper">
  <div
    [ngClass]="isAiMode 
      ? 'border-[#b45309] focus-within:border-[#f59e0b] focus-within:ring-amber-500/10' 
      : 'border-slate-200/80 focus-within:border-blue-500 focus-within:ring-blue-500/10 dark:border-white/10 dark:focus-within:border-blue-500'"
    class="flex items-center bg-slate-50/50 dark:bg-black/35 border-2 rounded-full p-0.5 md:p-1.5 pl-3 md:pl-4 pr-1.5 transition-all duration-300 focus-within:ring-4 shadow-sm w-full relative z-20">

    <!-- Left Icon -->
    <div class="flex items-center justify-center mr-3 shrink-0 select-none">
      <svg *ngIf="isAiMode" class="w-4 h-4 md:w-5 md:h-5 text-[#f59e0b]" fill="currentColor" viewBox="0 0 20 20">
        <path
          d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
      </svg>
      <svg *ngIf="!isAiMode" class="w-4 h-4 md:w-5 md:h-5 text-slate-400 dark:text-slate-500" fill="none"
        stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
    </div>

    <!-- AI Mode Input -->
    <input *ngIf="isAiMode" type="text" [ngModel]="situationQuery" (ngModelChange)="onSituationQueryChange($event)"
      (keyup.enter)="aiSearchTriggered.emit()"
      placeholder="Ask in English or हिंदी (e.g. मकान मालिक जबरदस्ती कर रहा है)..."
      class="flex-1 bg-transparent border-0 text-slate-800 dark:text-white text-sm outline-none placeholder-slate-400 dark:placeholder-slate-500 pr-2 w-full font-sans" />

    <!-- Keyword Mode Input -->
    <input *ngIf="!isAiMode" type="text" [ngModel]="normalSearchQuery" (ngModelChange)="onNormalQueryChange($event)"
      (keyup.enter)="searchTriggered.emit()" placeholder="What legal help do you need? (e.g. divorce, rent)"
      class="flex-1 bg-transparent border-0 text-slate-800 dark:text-white text-sm outline-none placeholder-slate-400 dark:placeholder-slate-500 pr-2 w-full font-sans" />

    <!-- Controls: Language switch, Clear, Microphone -->
    <div class="flex items-center gap-1 shrink-0 mr-1.5">
      <!-- Language Toggle (AI Mode only) -->
      <button *ngIf="isAiMode" type="button"
        (click)="languageToggled.emit(voiceLanguage === 'en-IN' ? 'hi-IN' : 'en-IN')"
        [appTooltip]="variant === 'desktop' ? 'Change voice typing language (English / हिंदी)' : ''"
        tooltipPlacement="top"
        class="bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-350 px-2.5 py-1 rounded-full text-[10px] font-bold border-0 cursor-pointer select-none transition-colors">
        {{ voiceLanguage === 'en-IN' ? 'EN' : 'हिंदी' }}
      </button>

      <!-- Clear Button -->
      <button *ngIf="hasQuery" type="button" (click)="cleared.emit()"
        [appTooltip]="variant === 'desktop' ? 'Clear search text' : ''" tooltipPlacement="top"
        class="text-slate-400 hover:text-slate-600 dark:text-slate-550 dark:hover:text-slate-300 p-2 rounded-full flex items-center justify-center transition-all cursor-pointer border-0 bg-transparent select-none">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>

      <!-- Microphone Button -->
      <button type="button" (click)="voiceToggled.emit()"
        [appTooltip]="variant === 'desktop' ? (isRecording ? 'Listening... Click to stop' : 'Search using your voice') : ''"
        tooltipPlacement="top"
        [ngClass]="isRecording ? 'text-red-500 bg-red-500/10 dark:bg-red-500/20 animate-pulse' : 'text-slate-400 hover:text-slate-600 dark:text-slate-500 dark:hover:text-slate-300 hover:bg-slate-100 dark:hover:bg-white/5'"
        class="p-2 rounded-full flex items-center justify-center transition-all cursor-pointer border-0 bg-transparent"
        [attr.aria-label]="isRecording ? 'Stop Recording' : 'Start Recording'">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd"
            d="M7 4a3 3 0 016 0v4a3 3 0 11-6 0V4zm4 10.93A7.001 7.001 0 0017 8a1 1 0 10-2 0A5 5 0 015 8a1 1 0 00-2 0 7.001 7.001 0 006 6.93V17H6a1 1 0 100 2h8a1 1 0 100-2h-3v-2.07z"
            clip-rule="evenodd" />
        </svg>
      </button>
    </div>

    <!-- Submit Button (Desktop only) -->
    <ng-container *ngIf="variant === 'desktop'">
      <!-- AI Search Button -->
      <button *ngIf="isAiMode" (click)="aiSearchTriggered.emit()" [disabled]="isAiSolving || !situationQuery.trim()"
        appTooltip="Solve case scenario using AI" tooltipPlacement="top"
        class="bg-[#8b5a2b] hover:bg-[#a16207] active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed text-white px-4 py-2 rounded-full flex items-center justify-center cursor-pointer transition-all text-xs font-bold gap-1.5 border-0 shadow-sm shrink-0">
        <svg *ngIf="isAiSolving" class="w-3.5 h-3.5 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        <span class="flex items-center gap-1">
          <span>&rarr;</span>
          <span>{{ isAiSolving ? 'Solving...' : 'Ask AI' }}</span>
        </span>
      </button>

      <!-- Keyword Search Button -->
      <button *ngIf="!isAiMode" (click)="searchTriggered.emit()" [disabled]="!normalSearchQuery.trim()"
        appTooltip="Search legal clinics & helpline resources" tooltipPlacement="top"
        class="bg-blue-600 hover:bg-blue-700 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed text-white px-4 py-2 rounded-full flex items-center justify-center cursor-pointer transition-all text-xs font-bold gap-1.5 border-0 shadow-sm shrink-0">
        <span class="flex items-center gap-1">
          <span>&rarr;</span>
          <span>Search</span>
        </span>
      </button>
    </ng-container>
  </div>

  <!-- Autocomplete Suggestions Dropdown (Keyword Mode only) -->
  <div *ngIf="!isAiMode && (filteredSuggestions.length > 0 || isSearchingSuggestions)"
    [class]="variant === 'mobile'
      ? 'absolute left-0 right-0 top-full mt-2 bg-white dark:bg-slate-950 border border-slate-200 dark:border-white/10 rounded-xl shadow-xl z-[90] overflow-y-auto max-h-[300px] scrollbar-none'
      : 'absolute left-0 right-0 top-full mt-3 bg-white dark:bg-slate-950 border border-slate-200 dark:border-white/10 rounded-xl shadow-xl z-[90] overflow-y-auto max-h-[420px] scrollbar-none'">
    <div [class]="variant === 'mobile' ? 'py-1' : 'py-2'">
      <!-- Shimmer Skeleton loading indicator -->
      <div *ngIf="isSearchingSuggestions" class="p-4 space-y-3 animate-pulse">
        <div class="h-3.5 bg-slate-200 dark:bg-slate-800 rounded w-1/3"></div>
        <div class="h-5 bg-slate-100 dark:bg-slate-900 rounded w-2/3"></div>
        <div class="h-5 bg-slate-100 dark:bg-slate-900 rounded w-1/2"></div>
      </div>

      <ng-container *ngIf="!isSearchingSuggestions">
        <ng-container *ngFor="let sug of filteredSuggestions; trackBy: trackBySuggestion">
          <!-- Category Header -->
          <div *ngIf="sug.isHeader"
            class="w-full text-left py-2 px-4 flex items-center justify-between border-b border-slate-100 dark:border-white/5 bg-slate-50/50 dark:bg-slate-900/30 select-none cursor-default"
            [class.py-3]="variant === 'desktop'" [class.px-5]="variant === 'desktop'">
            <div class="flex items-center gap-2.5 min-w-0" [class.gap-3]="variant === 'desktop'">
              <div [ngClass]="getCategoryColor(sug.category)" class="flex items-center justify-center shrink-0 rounded"
                style="width: 18px; height: 18px;">
                <app-category-icon [icon]="getSuggestionIcon(sug.category)" size="sm"></app-category-icon>
              </div>
              <span class="font-black text-slate-850 dark:text-slate-100 text-[11px] tracking-wider uppercase"
                [class.text-[12px]]="variant === 'desktop'">
                {{ sug.category }}
              </span>
            </div>
          </div>

          <!-- Subcategory Item -->
          <button *ngIf="!sug.isHeader" (click)="suggestionSelected.emit(sug)"
            class="group w-full text-left py-2 pl-5 pr-3 flex items-center justify-between hover:bg-slate-50 dark:hover:bg-white/[0.04] transition-all border-b border-slate-100 dark:border-white/5 last:border-0 cursor-pointer border-0 bg-transparent"
            [class.pl-8]="variant === 'desktop'" [class.py-3.5]="variant === 'desktop'">
            <div class="flex items-center gap-2 min-w-0 mr-2">
              <div class="flex items-center justify-center shrink-0 w-3 h-3">
                <span class="w-1.5 h-1.5 rounded-full bg-slate-350 dark:bg-slate-700"></span>
              </div>
              <div class="flex items-center gap-1.5 min-w-0">
                <span class="truncate text-slate-800 dark:text-slate-200 text-[11.5px] font-bold"
                  [class.text-[14px]]="variant === 'desktop'">
                  {{ sug.subcategory }}
                </span>
                <span class="text-[9px] text-slate-450 dark:text-slate-500 font-medium shrink-0"
                  [class.text-[11px]]="variant === 'desktop'">
                  in {{ sug.category }}
                </span>
              </div>
            </div>
            <div class="flex items-center shrink-0 opacity-40 group-hover:opacity-100 transition-opacity">
              <svg class="w-3.5 h-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" />
              </svg>
            </div>
          </button>
        </ng-container>
      </ng-container>
    </div>
  </div>

</div>
