<div appJargonTooltip class="pt-[70px] md:pt-[80px] print:pt-0">

  <!-- Emergency Helpline Ticker (data-driven sub-component) -->
  <app-emergency-ticker [isScrolled]="isScrolled"></app-emergency-ticker>

  <div class="w-full pt-6 pb-8 relative min-h-[75vh]">

    <!-- ================= STATE 1: SELECTION LANDING ================= -->
    <div
      [class]="isResultsMode ? 'absolute top-0 left-0 w-full opacity-0 -translate-x-full pointer-events-none' : 'relative w-full opacity-100 translate-x-0'"
      class="transition-all duration-500 ease-in-out transform">

      <!-- Hero Header Component (dynamic data and content projection) -->
      <app-hero-header [locationQuery]="locationQuery" [isLocationEstimated]="isLocationEstimated"
        [isStatsLoading]="isStatsLoading" [animatedStats]="animatedStats" (locationClicked)="openMapModal()"
        (suggestClicked)="openSuggestionModal()">

        <!-- Mobile Search Slot (projected into mobile layout in hero) -->
        <div mobile-search class="w-full">
          <app-search-bar [isAiMode]="isAiMode" [normalSearchQuery]="normalSearchQuery"
            [situationQuery]="situationQuery" [voiceLanguage]="voiceLanguage" [isRecording]="isRecording"
            [isAiSolving]="isAiSolving" [filteredSuggestions]="filteredSuggestions" [categories]="categories"
            [variant]="'mobile'" [isSearchingSuggestions]="isSearchingSuggestions" (aiModeChange)="toggleAiMode($event)"
            (normalSearchQueryChange)="normalSearchQuery = $event; saveSearchState()"
            (situationQueryChange)="situationQuery = $event; saveSearchState()"
            (searchTriggered)="triggerNormalSearch()" (aiSearchTriggered)="handleAiSearchInput()"
            (inputChanged)="handleNormalSearchInput()" (voiceToggled)="toggleVoiceRecording()"
            (languageToggled)="setVoiceLanguage($event)" (cleared)="clearSearchQuery(); saveSearchState()"
            (suggestionSelected)="selectSuggestion($event)">
          </app-search-bar>

          <!-- Recent Searches (Mobile) -->
          <div *ngIf="recentSearches.length > 0" class="mt-1.5 py-0.5">
            <div class="flex gap-1 overflow-x-auto py-0.5 scrollbar-none snap-x w-full">
              <div *ngFor="let s of recentSearches; let idx = index; trackBy: trackByRecentSearch"
                (click)="selectRecentSearch(s)"
                class="snap-start flex items-center gap-1.5 bg-slate-50 dark:bg-white/5 border border-slate-200/50 dark:border-white/5 py-0.5 px-1.5 rounded-full text-[9px] font-semibold text-slate-700 dark:text-slate-300 shrink-0">
                <span class="max-w-[110px] truncate">{{ s.query }}</span>
                <button (click)="removeRecentSearch(idx, $event)"
                  class="text-slate-400 dark:text-slate-550 hover:text-red-500 border-0 bg-transparent p-0 flex items-center justify-center ml-0.5"
                  appTooltip="Remove this search query from your history" tooltipPlacement="top">
                  <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Desktop Search Slot (projected into desktop layout in hero) -->
        <div desktop-search class="flex flex-col transition-all duration-300 min-h-[220px]">
          <app-search-bar [isAiMode]="isAiMode" [normalSearchQuery]="normalSearchQuery"
            [situationQuery]="situationQuery" [voiceLanguage]="voiceLanguage" [isRecording]="isRecording"
            [isAiSolving]="isAiSolving" [filteredSuggestions]="filteredSuggestions" [categories]="categories"
            [variant]="'desktop'" [isSearchingSuggestions]="isSearchingSuggestions"
            (aiModeChange)="toggleAiMode($event)"
            (normalSearchQueryChange)="normalSearchQuery = $event; saveSearchState()"
            (situationQueryChange)="situationQuery = $event; saveSearchState()"
            (searchTriggered)="triggerNormalSearch()" (aiSearchTriggered)="handleAiSearchInput()"
            (inputChanged)="handleNormalSearchInput()" (voiceToggled)="toggleVoiceRecording()"
            (languageToggled)="setVoiceLanguage($event)" (cleared)="clearSearchQuery(); saveSearchState()"
            (suggestionSelected)="selectSuggestion($event)">
          </app-search-bar>

          <!-- Recent Searches (Desktop) -->
          <div *ngIf="recentSearches.length > 0" class="mt-3">
            <div class="flex items-center gap-2 mb-2">
              <span
                class="text-[9px] font-black text-slate-400 dark:text-slate-600 uppercase tracking-wider">Recent</span>
              <button (click)="clearRecentSearches()"
                class="text-[10px] text-red-400 hover:text-red-600 hover:underline font-bold cursor-pointer bg-transparent border-0"
                appTooltip="Permanently erase all recent searches" tooltipPlacement="top">Clear
                All</button>
            </div>
            <div class="flex gap-2 overflow-x-auto scrollbar-none">
              <div *ngFor="let s of recentSearches; let idx = index; trackBy: trackByRecentSearch"
                (click)="selectRecentSearch(s)"
                class="flex items-center gap-1.5 bg-slate-50 dark:bg-white/5 border border-slate-200/50 dark:border-white/5 py-1 px-2.5 rounded-full text-[10.5px] font-semibold text-slate-700 dark:text-slate-300 shrink-0 cursor-pointer hover:border-blue-400 dark:hover:border-amber-400/30 transition-all">
                <span class="max-w-[150px] truncate">{{ s.query }}</span>
                <button (click)="removeRecentSearch(idx, $event)"
                  class="text-slate-400 dark:text-slate-550 hover:text-red-500 border-0 bg-transparent p-0 flex items-center justify-center ml-0.5"
                  appTooltip="Remove this search query from your history" tooltipPlacement="top">
                  <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>

      </app-hero-header>

      <!-- Category Selection Grid Section -->
      <div class="w-[90%] max-w-8xl mx-auto">
        <!-- AI Summary Callout -->
        <div *ngIf="aiSummary"
          class="mt-3 mb-3 md:mb-0 bg-indigo-50 dark:bg-indigo-950/30 border border-indigo-200 dark:border-indigo-800/50 rounded-xl p-2 md:p-3 flex items-start gap-1.5 md:gap-3 animate-fade-in">
          <div
            class="w-6 h-6 md:w-8 md:h-8 rounded-full bg-indigo-600 flex items-center justify-center shrink-0 mt-0.5">
            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9.663 17h4.673M12 3v1m6.364.364l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
            </svg>
          </div>
          <div class="flex-1">
            <div class="flex items-center justify-between mb-0 md:mb-1">
              <span
                class="text-[10px] md:text-xs font-bold text-indigo-700 dark:text-indigo-300 uppercase tracking-wider">
                AI Analysis — {{activeCategory}}
              </span>
              <button (click)="aiSummary = ''"
                class="text-indigo-400 hover:text-indigo-600 dark:hover:text-indigo-200 cursor-pointer transition-all bg-transparent border-0"
                appTooltip="Close this AI summary" tooltipPlacement="left">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
              </button>
            </div>
            <p class="text-[11px] md:text-sm text-indigo-900 dark:text-indigo-100 leading-relaxed m-0">{{aiSummary}}</p>
          </div>
        </div>

        <app-category-grid *ngIf="categories.length > 0" [categories]="categories" [activeCategory]="activeCategory"
          [locationQuery]="locationQuery" [selectedSubcategories]="selectedSubcategories"
          (categorySelected)="selectCategory($event)" (subcategoryToggled)="toggleSubcategory($event)"
          (searchTriggered)="triggerSearch()" (searchModeToggled)="toggleSearchMode()"
          (aiSuggestionTried)="clickTrySuggestion($event)">
        </app-category-grid>
      </div>
    </div>

    <!-- ================= STATE 2: RESULTS SPLIT VIEW (Lazy-loaded via @defer) ================= -->
    <div
      [class]="isResultsMode 
        ? (transitionComplete ? 'relative w-full opacity-100' : 'relative w-full opacity-100 translate-x-0 transform') 
        : 'absolute top-0 left-0 w-full opacity-0 translate-x-full pointer-events-none transform'"
      class="transition-all duration-500 ease-in-out">
      @defer (when isResultsMode) {
      <app-results-view *ngIf="isResultsMode" [activeCategory]="activeCategory" [locationQuery]="locationQuery"
        (back)="goBackToCategories()" (suggestClicked)="openSuggestionModal()" (changeLocation)="openMapModal()">
      </app-results-view>
      }
    </div>
  </div>

  <!-- Suggest Resource Modal -->
  <app-suggest-resource-modal [isOpen]="isSuggestModalOpen" (close)="closeSuggestionModal()"
    (submitted)="onSuggestionSubmitted($event)">
  </app-suggest-resource-modal>

  <!-- Location Map Modal -->
  <app-location-map-modal *ngIf="showMapModal" [initialCity]="locationQuery"
    (locationConfirmed)="onMapLocationConfirmed($event)" (closed)="closeMapModal()">
  </app-location-map-modal>

</div>
