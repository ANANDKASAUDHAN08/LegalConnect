<div class="auth-page min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
  <div class="bg-orb bg-orb-2 opacity-10"></div>
  <div class="auth-card card p-10 md:p-12 w-full max-w-[440px] flex flex-col gap-7 relative z-10">
    <div class="auth-header flex flex-col gap-2">
      <a routerLink="/" class="auth-brand no-underline font-extrabold text-[1.1rem] text-white mb-2 block">⚖️ LegalConnect</a>
      <h1 class="auth-title font-serif text-[2rem] text-white leading-tight">Create Account</h1>
      <p class="auth-subtitle text-slate-400">Join India's premier legal platform</p>
    </div>
    
    <form class="auth-form flex flex-col gap-5" (ngSubmit)="onSubmit()">
      <div class="form-group flex flex-col gap-1.5">
        <label class="form-label text-[0.875rem] font-medium text-slate-400" for="reg-name">Full Name</label>
        <input id="reg-name" type="text" class="form-control" placeholder="Anand Kumar" [(ngModel)]="fullName" name="fullName" required>
      </div>
      <div class="form-group flex flex-col gap-1.5">
        <label class="form-label text-[0.875rem] font-medium text-slate-400" for="reg-email">Email Address</label>
        <input id="reg-email" type="email" class="form-control" placeholder="you@example.com" [(ngModel)]="email" name="email" required>
      </div>
      <div class="form-group flex flex-col gap-1.5">
        <label class="form-label text-[0.875rem] font-medium text-slate-400" for="reg-password">Password</label>
        <input id="reg-password" type="password" class="form-control" placeholder="Min. 6 characters" [(ngModel)]="password" name="password" required>
      </div>
      
      <div class="form-group flex flex-col gap-2">
        <label class="form-label text-[0.875rem] font-medium text-slate-400">I am a</label>
        <div class="role-toggle grid grid-cols-2 gap-2.5">
          <button type="button" class="role-btn p-3 rounded-lg border border-white/5 bg-navy-surface text-slate-400 font-semibold text-[0.9rem] transition-all hover:border-primary hover:text-white" 
            [class.active]="role === 'Client'" (click)="role='Client'" id="role-client">👤 Client</button>
          <button type="button" class="role-btn p-3 rounded-lg border border-white/5 bg-navy-surface text-slate-400 font-semibold text-[0.9rem] transition-all hover:border-primary hover:text-white" 
            [class.active]="role === 'Lawyer'" (click)="role='Lawyer'" id="role-lawyer">⚖️ Lawyer</button>
        </div>
      </div>
      
      <div *ngIf="error" class="error-msg text-red-400 text-[0.875rem] p-3.5 bg-red-400/10 rounded-lg border border-red-400/20">
        ⚠️ {{ error }}
      </div>
      <div *ngIf="success" class="success-msg text-green-400 text-[0.875rem] p-3.5 bg-green-400/10 rounded-lg border border-green-400/20">
        ✅ {{ success }}
      </div>
      
      <button id="register-submit" type="submit" class="btn btn-primary w-full py-3.5" [disabled]="loading">
        {{ loading ? 'Creating Account...' : 'Create Account' }}
      </button>
    </form>
    
    <p class="auth-footer text-center text-slate-400 text-[0.9rem]">
      Already have an account? <a routerLink="/login" class="auth-link text-primary-light font-semibold no-underline hover:underline">Sign in</a>
    </p>
  </div>
</div>
