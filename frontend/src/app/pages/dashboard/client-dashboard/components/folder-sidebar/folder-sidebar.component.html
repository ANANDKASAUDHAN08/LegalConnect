<!-- DESKTOP SIDEBAR: Collections & Folders Manager (Desktop Only) -->
<aside id="folders-section" *ngIf="layout === 'desktop'"
  class="flex flex-col w-full bg-white/70 dark:bg-slate-900/40 border border-slate-200/50 dark:border-white/5 rounded-2xl p-5 shadow-xs h-[550px] overflow-hidden">
  <div class="flex items-center justify-between pb-2 border-b border-slate-100 dark:border-slate-800/60 mb-3 shrink-0">
    <h2 class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Research Folders</h2>
  </div>

  <!-- Collection items list container -->
  <div class="flex flex-col flex-1 overflow-hidden">
    <!-- All (Fixed top) -->
    <button (click)="selectCollection('All')"
      [class]="selectedCollection === 'All' ? 'bg-indigo-50/60 text-indigo-600 dark:bg-indigo-950/20 dark:text-indigo-400 font-bold' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800/60 font-medium'"
      class="w-full text-left px-3 py-2 rounded-xl text-xs flex items-center justify-between transition-colors border-0 shrink-0"
      appTooltip="View all saved items">
      <span class="flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5">
          <rect x="3" y="3" width="7" height="9"></rect>
          <rect x="14" y="3" width="7" height="5"></rect>
          <rect x="14" y="12" width="7" height="9"></rect>
          <rect x="3" y="16" width="7" height="5"></rect>
        </svg>
        All Sections
      </span>
      <span
        class="text-[10px] px-1.5 py-0.5 rounded-full bg-slate-100 dark:bg-slate-800 font-bold text-slate-800 dark:text-slate-100">{{
        allBookmarks.length }}</span>
    </button>

    <!-- Unassigned (Fixed top) -->
    <button (click)="selectCollection('Unassigned')"
      [class]="selectedCollection === 'Unassigned' ? 'bg-indigo-50/60 text-indigo-600 dark:bg-indigo-950/20 dark:text-indigo-400 font-bold' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800/60 font-medium'"
      class="w-full text-left px-3 py-2 rounded-xl text-xs flex items-center justify-between transition-colors border-0 shrink-0"
      appTooltip="Saved items not assigned to any folder">
      <span class="flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        General Reference
      </span>
      <span *ngIf="unassignedCount > 0"
        class="text-[10px] px-1.5 py-0.5 rounded-full bg-slate-100 dark:bg-slate-800 font-bold text-slate-800 dark:text-slate-200 select-none">
        {{ unassignedCount }}
      </span>
      <span *ngIf="unassignedCount === 0"
        class="text-[10px] px-1.5 py-0.5 rounded-full border border-dashed border-slate-200 dark:border-slate-800 bg-transparent text-slate-300 dark:text-slate-200 font-medium select-none"
        appTooltip="Empty folder">
        0
      </span>
    </button>

    <div class="h-px bg-slate-100 dark:bg-slate-800/80 my-2 mx-1 shrink-0"></div>

    <!-- Folder Management (New Folder Button & Search Bar) (Fixed top) -->
    <div class="space-y-2 mt-1 mb-3 shrink-0">
      <!-- Create Folder trigger (below divider) -->
      <button (click)="onCreateNewFolder()"
        class="w-full py-2 border border-dashed border-slate-200 dark:border-slate-800 text-indigo-600 dark:text-indigo-400 hover:bg-indigo-50/40 dark:hover:bg-indigo-950/10 transition-colors rounded-xl text-xs font-bold bg-transparent cursor-pointer active:scale-95 select-none"
        appTooltip="Create research folder">
        + New Folder
      </button>

      <!-- Desktop Sidebar Folder Search (now positioned below divider) -->
      <div class="relative w-full shrink-0">
        <input type="text" [ngModel]="sidebarFolderSearchQuery" (ngModelChange)="onSearchQueryChange($event)"
          placeholder="Search folders..."
          class="w-full pl-8 pr-3 py-1.5 bg-slate-50 dark:bg-slate-950/45 border border-slate-200 dark:border-slate-800 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 rounded-xl text-xs outline-none text-slate-900 dark:text-white" />
        <svg xmlns="http://www.w3.org/2000/svg"
          class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-400" fill="none" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </div>
    </div>

    <!-- Scrollable Custom Folders list (Scrolls independently!) -->
    <div class="flex-1 overflow-y-auto scrollbar-none space-y-1 min-h-0 pr-0.5">
      <div *ngIf="filteredSidebarFolders.length === 0"
        class="px-3 py-4 text-center text-[11px] text-slate-400 dark:text-slate-500">
        {{ customCollections.length === 0 ? 'No custom folders created.' : 'No matching folders found.' }}
      </div>

      <div *ngFor="let folder of filteredSidebarFolders; trackBy: trackByFolder"
        [class]="selectedCollection === folder ? 'bg-indigo-50/60 text-indigo-600 dark:bg-indigo-950/20 dark:text-indigo-400 font-bold' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800/60 font-medium'"
        class="group/folder w-full px-3 py-2 rounded-xl text-xs flex items-center justify-between transition-colors border-0 select-none"
        appTooltip="Filter by folder: {{ folder }}">
        <span (click)="selectCollection(folder)" class="flex items-center gap-2 truncate pr-2 cursor-pointer flex-1">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" class="text-indigo-500 shrink-0">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
          </svg>
          <span class="truncate">{{ folder }}</span>
        </span>
        <div class="flex items-center gap-1 shrink-0">
          <!-- Count Badge -->
          <span *ngIf="getFolderCount(folder) > 0"
            class="text-[10px] px-1.5 py-0.5 rounded-full bg-slate-100 dark:bg-slate-800 font-bold text-slate-800 dark:text-slate-200 mr-1 select-none">
            {{ getFolderCount(folder) }}
          </span>
          <span *ngIf="getFolderCount(folder) === 0"
            class="text-[10px] px-1.5 py-0.5 rounded-full border border-dashed border-slate-200 dark:border-slate-800 bg-transparent text-slate-800 dark:text-slate-200 font-medium mr-1 select-none"
            appTooltip="Empty folder">
            0
          </span>
          <!-- Rename -->
          <button (click)="onRenameFolder(folder, $event)"
            class="text-slate-700 hover:text-indigo-650 dark:text-slate-200 dark:hover:text-indigo-400 p-1.5 hover:bg-slate-100 dark:hover:bg-slate-800/80 rounded-lg bg-transparent border-0 cursor-pointer flex items-center justify-center transition-all"
            appTooltip="Rename Folder">
            <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
              <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
          </button>
          <!-- Delete -->
          <button (click)="onDeleteFolder(folder, $event)"
            class="text-slate-700 hover:text-red-500 dark:text-slate-200 dark:hover:text-red-400 p-1.5 hover:bg-red-50 dark:hover:bg-red-950/20 rounded-lg bg-transparent border-0 cursor-pointer flex items-center justify-center transition-all"
            appTooltip="Delete Folder">
            <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</aside>

<!-- MOBILE FOLDER PILLS (Mobile Only) -->
<div *ngIf="layout === 'mobile' && activeTab === 'bookmarks'"
  class="lg:hidden flex items-center gap-2 py-1 border-b border-slate-100 dark:border-slate-800/60 pb-3 mt-2 px-4 -mx-4 select-none w-[calc(100%+2rem)] overflow-hidden shrink-0">

  <div class="flex items-center gap-2 overflow-x-auto scrollbar-none flex-1">

    <!-- Folders Search Input (expandable inline) -->
    <div *ngIf="showMobileFolderSearch"
      class="relative min-w-[130px] flex-1 max-w-[180px] shrink-0 animate-[fadeIn_0.15s_ease-out]">
      <input type="text" [ngModel]="sidebarFolderSearchQuery" (ngModelChange)="onSearchQueryChange($event)"
        placeholder="Search..."
        class="w-full pl-7 pr-7 py-1 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 rounded-full text-[11px] outline-none text-slate-900 dark:text-white" />
      <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3 h-3 text-slate-400"
        fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <!-- Clear & Close search -->
      <button (click)="onSearchQueryChange(''); toggleMobileFolderSearch(false)"
        class="absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 bg-transparent border-0 cursor-pointer p-0 flex items-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="9" height="9" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="3">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- Folder Search Toggle Trigger -->
    <button *ngIf="!showMobileFolderSearch" (click)="toggleMobileFolderSearch(true)"
      class="w-7 h-7 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-650 dark:text-slate-350 flex items-center justify-center shrink-0 border-0 cursor-pointer active:scale-95 transition-all"
      appTooltip="Search folders">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"
        stroke-width="2.5">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </button>

    <!-- "+ Add" button (Moved to front start) -->
    <button (click)="onCreateNewFolder()"
      class="px-3.5 py-1.5 rounded-full text-xs font-bold border border-dashed border-indigo-400 text-indigo-600 dark:text-indigo-400 bg-transparent shrink-0 active:scale-95 cursor-pointer"
      appTooltip="Create research folder">
      + Add
    </button>

    <!-- Standard Folder Pills -->
    <button (click)="selectCollection('All')"
      [class]="selectedCollection === 'All' ? 'bg-indigo-600 text-white' : 'bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300'"
      class="px-4 py-1.5 rounded-full text-xs font-semibold shrink-0 transition-colors border-0">
      All ({{ allBookmarks.length }})
    </button>
    <button (click)="selectCollection('Unassigned')"
      [class]="selectedCollection === 'Unassigned' ? 'bg-indigo-600 text-white' : 'bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300'"
      class="px-4 py-1.5 rounded-full text-xs font-semibold shrink-0 transition-colors border-0">
      General ({{ unassignedCount }})
    </button>
    <button *ngFor="let folder of filteredSidebarFolders; trackBy: trackByFolder" (click)="selectCollection(folder)"
      [class]="selectedCollection === folder ? 'bg-indigo-600 text-white' : 'bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300'"
      class="px-4 py-1.5 rounded-full text-xs font-semibold shrink-0 transition-colors border-0 font-medium">
      {{ folder }} ({{ getFolderCount(folder) }})
    </button>
  </div>
</div>
