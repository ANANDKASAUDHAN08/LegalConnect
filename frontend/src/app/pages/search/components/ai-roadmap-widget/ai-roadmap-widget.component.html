<!-- AI Roadmap Widget Skeleton -->
<div *ngIf="loading"
  class="card p-3 md:px-6 md:py-4 border-indigo-200 dark:border-indigo-900 bg-indigo-50/50 dark:bg-indigo-950/20 shadow-lg animate-pulse relative overflow-hidden w-full mb-6">
  <div class="flex flex-row items-start justify-between gap-1.5 md:gap-4 mb-2">
    <div class="flex-1 flex flex-row items-start gap-1.5 md:gap-4 min-w-0">
      <div class="w-8 h-8 md:w-10 md:h-10 rounded-xl bg-indigo-200 dark:bg-indigo-850 shrink-0"></div>
      <div class="flex-1 space-y-2">
        <div class="h-3 bg-indigo-200 dark:bg-indigo-800/80 rounded w-24"></div>
        <div class="h-5.5 bg-indigo-200 dark:bg-indigo-800/80 rounded w-1/3"></div>
      </div>
    </div>
  </div>
  <div class="w-full md:pl-14 space-y-2 mt-3">
    <div class="h-3 bg-indigo-200 dark:bg-indigo-800/80 rounded w-11/12"></div>
    <div class="h-3 bg-indigo-200 dark:bg-indigo-800/80 rounded w-4/5"></div>
    <div class="hidden md:flex flex-col gap-4 border-l-2 border-indigo-200 dark:border-indigo-800 pl-4 mt-6">
      <div *ngFor="let x of [1, 2, 3]" class="relative py-1">
        <div
          class="absolute -left-[23px] top-2.5 w-3.5 h-3.5 rounded-full bg-indigo-400 border-2 border-white dark:border-slate-900">
        </div>
        <div class="h-4 bg-indigo-200 dark:bg-indigo-800/80 rounded w-36 mb-1.5"></div>
        <div class="h-3 bg-indigo-100 dark:bg-indigo-900/60 rounded w-72"></div>
      </div>
    </div>
    <div class="flex md:hidden flex-col gap-1.5 mt-4">
      <div *ngFor="let x of [1, 2, 3]"
        class="h-9 border border-indigo-100/50 dark:border-indigo-900/30 rounded-xl bg-white/40 dark:bg-slate-900/40">
      </div>
    </div>
  </div>
</div>

<!-- ======================= AI ROADMAP WIDGET ======================= -->
<div *ngIf="!loading && roadmap"
  class="card p-3 md:px-6 md:py-4 border-indigo-200 dark:border-indigo-900 bg-indigo-50/50 dark:bg-indigo-950/20 shadow-lg animate-fade-in relative overflow-hidden w-full mb-2">
  <div class="absolute right-0 top-0 w-24 h-24 bg-indigo-500/10 rounded-full blur-xl pointer-events-none"></div>

  <!-- Header Flex container -->
  <div class="flex flex-row items-start justify-between gap-1.5 md:gap-4" [class.mb-2]="!collapsedRoadmap">
    <!-- Left Side Clickable area for collapse toggle -->
    <div (click)="toggleRoadmapCollapse()"
      class="flex-1 flex flex-row items-start gap-1.5 md:gap-4 cursor-pointer select-none min-w-0 group/header">
      <div
        class="w-8 h-8 md:w-10 md:h-10 rounded-xl bg-indigo-600 flex items-center justify-center text-white shrink-0 group-hover/header:bg-indigo-700 transition-colors">
        <svg class="w-4 h-4 md:w-6 md:h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9.663 17h4.673M12 3v1m6.364.364l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
        </svg>
      </div>
      <div class="flex-1 min-w-0">
        <span class="text-[10px] font-bold text-indigo-600 dark:text-indigo-400 uppercase tracking-widest block">
          AI Solution Roadmap
        </span>
        <h2 class="font-sans text-sm md:text-xl font-bold text-slate-800 dark:text-white m-0">
          Procedural Guidance for your
          <span class="inline-flex items-center gap-1.5 whitespace-nowrap">
            situation
            <svg [class]="collapsedRoadmap ? '' : 'rotate-180'"
              class="w-4 h-4 text-indigo-500 dark:text-indigo-400 transition-transform duration-200 shrink-0"
              fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
            </svg>
          </span>
        </h2>
      </div>
    </div>
    <!-- Actions -->
    <div class="flex items-center shrink-0 self-start pt-1 md:pt-1.5">
      <button (click)="dismiss.emit()"
        class="p-1.5 rounded-lg hover:bg-red-500/10 text-slate-400 hover:text-red-600 dark:hover:text-red-400 cursor-pointer border-none bg-transparent flex items-center justify-center transition-colors"
        aria-label="Dismiss roadmap">
        <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Grid/Content Container -->
  <div *ngIf="!collapsedRoadmap" class="w-full md:pl-14 animate-slide-up">
    <p class="text-slate-600 dark:text-slate-300 text-xs md:text-sm leading-relaxed mb-2">
      {{ roadmap.caseSummary }}
    </p>

    <!-- Timeline Steps (Desktop only) -->
    <div class="hidden md:flex flex-col gap-4 border-l-2 border-indigo-300 dark:border-indigo-800 pl-4 mt-6">
      <div *ngFor="let step of roadmap.roadmapSteps; let idx = index; trackBy: trackByRoadmapStep" class="relative">
        <div
          class="absolute -left-[25px] top-1 w-4 h-4 rounded-full bg-indigo-600 border-[3px] border-white dark:border-slate-900 flex items-center justify-center">
        </div>
        <h3 class="font-bold text-slate-800 dark:text-slate-100 text-sm">{{ step.title }}</h3>
        <p class="text-xs text-slate-500 dark:text-slate-400 leading-relaxed mt-0.5">{{ step.detail }}</p>
      </div>
    </div>

    <!-- Mobile Stepper Accordion (Mobile only) -->
    <div class="flex md:hidden flex-col gap-1.5 mt-2">
      <div *ngFor="let step of roadmap.roadmapSteps; let idx = index; trackBy: trackByRoadmapStep"
        class="border border-indigo-100/45 dark:border-indigo-900/45 rounded-xl bg-white dark:bg-slate-900 overflow-hidden">
        <button (click)="toggleRoadmapStep(idx)"
          class="w-full flex items-center justify-between p-2 text-left border-none bg-transparent cursor-pointer">
          <span class="flex items-center gap-2">
            <span
              [class]="activeRoadmapStepIndex === idx ? 'bg-indigo-600 text-white' : 'bg-indigo-50 dark:bg-indigo-950/40 text-indigo-600 dark:text-indigo-400'"
              class="w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-black shrink-0">
              {{ idx + 1 }}
            </span>
            <span class="font-bold text-slate-800 dark:text-slate-100 text-xs">{{ step.title }}</span>
          </span>
          <svg [class]="activeRoadmapStepIndex === idx ? 'rotate-180 text-indigo-600' : 'text-slate-400'"
            class="w-4 h-4 transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
          </svg>
        </button>
        <div *ngIf="activeRoadmapStepIndex === idx"
          class="px-3.5 pb-2 text-xs text-slate-600 dark:text-slate-400 leading-relaxed border-t border-indigo-100/50 dark:border-indigo-950/20 bg-indigo-100/10 dark:bg-indigo-950/5">
          {{ step.detail }}
        </div>
      </div>
    </div>
  </div>
</div>
