<!-- Emergency Arrest Guides Skeleton -->
<div *ngIf="loading"
  class="card p-3 md:p-6 border-red-200 dark:border-red-950/60 bg-red-50/50 dark:bg-red-950/10 shadow-lg animate-pulse relative w-full mb-6">
  <div class="flex flex-row items-start justify-between gap-1.5 md:gap-4 mb-4">
    <div class="flex-1 flex flex-row items-start gap-1.5 md:gap-4 min-w-0">
      <div class="w-8 h-8 md:w-10 md:h-10 rounded-xl bg-red-200 dark:bg-red-800/80 shrink-0"></div>
      <div class="flex-1 space-y-2">
        <div class="h-3 bg-red-200 dark:bg-red-800/80 rounded w-28"></div>
        <div class="h-5.5 bg-red-200 dark:bg-red-800/80 rounded w-1/2"></div>
      </div>
    </div>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-3.5 w-full md:pl-14">
    <div *ngFor="let x of [1, 2, 3, 4]" class="flex gap-2">
      <div class="h-3.5 bg-red-200 dark:bg-red-800/80 rounded w-4 shrink-0"></div>
      <div class="flex-1 space-y-1.5">
        <div class="h-3.5 bg-red-200 dark:bg-red-800/80 rounded w-1/3"></div>
        <div class="h-3 bg-slate-200 dark:bg-slate-800/80 rounded w-11/12"></div>
      </div>
    </div>
  </div>
</div>

<!-- Actual Emergency Rights Box -->
<div *ngIf="!loading"
  class="card p-3 md:p-6 border-red-200 dark:border-red-950/60 bg-red-50/50 dark:bg-red-950/10 shadow-lg animate-fade-in relative w-full mb-2">

  <!-- Header Flex container -->
  <div class="flex flex-row items-start justify-between gap-1.5 md:gap-4" [class.mb-4]="!collapsedEmergency">
    <!-- Left Side Clickable area for collapse toggle -->
    <div (click)="toggleEmergencyCollapse()"
      class="flex-1 flex flex-row items-start gap-1.5 md:gap-4 cursor-pointer select-none min-w-0 group/header">
      <div
        class="w-8 h-8 md:w-10 md:h-10 rounded-xl bg-red-500 flex items-center justify-center text-white shrink-0 group-hover/header:bg-red-600 transition-colors">
        <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
      </div>
      <div class="flex-1 min-w-0">
        <span class="text-[10px] font-bold text-red-500 dark:text-red-400 uppercase tracking-widest block mb-1">
          Emergency Legal Info
        </span>
        <h2 class="font-sans text-sm md:text-xl font-bold text-slate-800 dark:text-white m-0">
          Your 5 Constitutional Rights During Police
          <span class="inline-flex items-center gap-1.5 whitespace-nowrap">
            Arrest
            <svg [class]="collapsedEmergency ? '' : 'rotate-180'"
              class="w-4 h-4 text-red-500 dark:text-red-400 transition-transform duration-200 shrink-0" fill="none"
              stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
            </svg>
          </span>
        </h2>
      </div>
    </div>
    <!-- Actions -->
    <div class="flex items-center shrink-0 self-start pt-1 md:pt-1.5">
      <button (click)="dismiss.emit()"
        class="p-1.5 rounded-lg hover:bg-red-500/10 text-slate-400 hover:text-red-600 dark:hover:text-red-400 cursor-pointer border-none bg-transparent flex items-center justify-center transition-colors"
        aria-label="Dismiss emergency guides">
        <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Grid Container: Collapsible wrapper -->
  <div *ngIf="!collapsedEmergency"
    class="grid grid-cols-1 md:grid-cols-2 gap-2 md:gap-3 text-xs leading-relaxed text-slate-600 dark:text-slate-300 w-full md:pl-14 animate-slide-up">

    <div *ngFor="let item of arrestRights; trackBy: trackByArrestRight" class="flex gap-2">
      <span class="text-red-500 font-bold">{{ item.num }}.</span>
      <div>
        <strong>{{ item.title }}</strong>: {{ item.desc }}
      </div>
    </div>

  </div>
</div>
