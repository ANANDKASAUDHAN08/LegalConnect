<div
  class="search-bar-container card shadow-md bg-white dark:bg-slate-950/90 border border-slate-200 dark:border-slate-800/80 transition-all duration-300 hover:shadow-lg hover:border-blue-400 dark:hover:border-blue-800/70 focus-within:border-blue-500 focus-within:ring-4 focus-within:ring-blue-500/10 dark:focus-within:border-blue-600 dark:focus-within:ring-blue-600/15 relative rounded-2xl z-50"
  [ngClass]="size === 'compact' ? 'p-1.5' : 'p-2 md:p-2.5'">

  <div class="flex flex-col md:flex-row gap-2 items-stretch md:items-center">
    <!-- Query input area -->
    <div class="relative flex-1 flex items-center" [ngClass]="size === 'compact' ? 'min-h-[46px]' : 'min-h-[48px]'">
      <span class="absolute left-3 opacity-60">
        <svg class="w-4 h-4 text-slate-400 dark:text-slate-500" fill="none" stroke="currentColor" stroke-width="2.5"
          viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </span>
      <input type="text" [ngModel]="query" (ngModelChange)="onQueryChange($event)" (focus)="onFocus()"
        (keyup.enter)="performSearch()" placeholder="e.g. 'cheque bounce', 'tenant eviction', 'FIR rights'..."
        class="w-full pl-9 pr-16 py-2 rounded-xl bg-transparent border-0 text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 text-sm focus:outline-none focus:ring-0">

      <!-- Voice controls -->
      <div class="absolute right-2 flex items-center gap-1.5">
        <button (click)="setVoiceLanguage(voiceLanguage === 'ENG' ? 'HI' : 'ENG')"
          class="text-[9px] font-black border border-slate-200 dark:border-slate-700 px-2 py-0.5 rounded bg-slate-100 dark:bg-slate-800 text-accent dark:text-accent/90 transition-colors hover:bg-slate-200 dark:hover:bg-slate-700 cursor-pointer"
          appTooltip="Switch dictation language" tooltipPlacement="top">
          {{ voiceLanguage }}
        </button>

        <button (click)="toggleVoiceRecording()"
          [ngClass]="isRecording ? 
            'bg-red-500 text-white recording-pulse border-transparent' : 
            'bg-red-50/60 dark:bg-red-950/20 text-red-500 dark:text-red-400 border-red-200/50 dark:border-red-900/40 hover:bg-red-100 dark:hover:bg-red-950/50 hover:text-red-600 dark:hover:text-red-300 hover:border-red-300 dark:hover:border-red-800'"
          class="w-7 h-7 rounded-full flex items-center justify-center border transition-all cursor-pointer"
          appTooltip="Voice search" tooltipPlacement="top">

          <!-- Mic Icon (Default State) -->
          <svg *ngIf="!isRecording" class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5"
            viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
          </svg>

          <!-- Stop Icon (Listening State) -->
          <svg *ngIf="isRecording" class="w-2.5 h-2.5" fill="currentColor" viewBox="0 0 24 24">
            <rect x="4" y="4" width="16" height="16" rx="3" />
          </svg>

        </button>
      </div>
    </div>

    <!-- Beautiful Vertical Divider Line -->
    <div class="hidden md:block w-px h-5 bg-slate-200 dark:bg-slate-800/60 self-center"></div>

    <!-- Actions -->
    <div class="flex gap-2 items-center justify-end">
      <!-- OCR scan label -->
      <label
        class="rounded-xl flex items-center justify-center border border-slate-200 dark:border-slate-800 bg-slate-55/70 dark:bg-slate-900 hover:bg-slate-100 dark:hover:bg-slate-800 cursor-pointer transition-colors shadow-2xs shrink-0"
        [ngClass]="size === 'compact' ? 'w-10 h-10' : 'w-10 h-10 md:w-11 md:h-11'"
        appTooltip="Scan a notice/FIR via OCR" tooltipPlacement="top">
        <svg class="w-4 h-4 text-slate-500 dark:text-slate-400" fill="none" stroke="currentColor" stroke-width="2.2"
          viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        <input type="file" (change)="triggerOcrScan($event)" class="hidden" accept="image/*,application/pdf">
      </label>
      <button class="btn btn-accent px-6 rounded-xl text-xs font-black shadow-xs flex-shrink-0 cursor-pointer"
        (click)="performSearch()" [disabled]="loading" [ngClass]="size === 'compact' ? 'h-10' : 'h-10 md:h-11'"
        appTooltip="Search across all legal categories" tooltipPlacement="top">
        Search
      </button>
    </div>
  </div>

  <!-- Autocomplete Suggestions Panel -->
  <div *ngIf="showSuggestions && suggestions.length > 0"
    class="absolute left-0 right-0 top-full mt-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800/80 rounded-xl shadow-2xl z-[100] max-h-72 overflow-y-auto scrollbar-none animate-scale-up">
    <!-- Dropdown Header -->
    <div
      class="px-4 py-2.5 border-b border-slate-200/20 dark:border-slate-800/30 bg-slate-50/50 dark:bg-slate-950/40 flex items-center justify-between text-[10px] text-slate-400 dark:text-slate-500 font-bold uppercase tracking-wider">
      <span>Matching Laws & Sections</span>
      <span class="text-[9px] font-semibold lowercase text-slate-400">Found {{ suggestions.length }} matches</span>
    </div>
    <div *ngFor="let s of suggestions" (click)="selectSuggestion(s)"
      class="group px-4 py-3 hover:bg-blue-500/5 dark:hover:bg-slate-800/60 cursor-pointer flex items-center gap-3.5 border-b border-slate-200/20 dark:border-slate-800/30 last:border-0 transition-all duration-200 border-l-4 border-l-transparent hover:border-l-accent">
      <span
        class="p-1.5 rounded-lg bg-slate-100 dark:bg-slate-800/60 text-slate-400 group-hover:text-accent dark:group-hover:text-accent transition-colors flex-shrink-0">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
      </span>
      <div class="flex-grow min-w-0">
        <div class="flex items-center">
          <span
            class="inline-flex items-center px-1.5 py-0.5 rounded text-[9px] font-extrabold uppercase tracking-wider"
            [ngClass]="{
              'bg-blue-500/10 text-blue-600 dark:text-blue-400 border border-blue-500/20': s.act.includes('BNS'),
              'bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 border border-emerald-500/20': s.act.includes('IPC'),
              'bg-amber-500/10 text-amber-600 dark:text-amber-400 border border-amber-500/20': !s.act.includes('BNS') && !s.act.includes('IPC')
            }">
            {{ s.act }}
          </span>
          <span class="text-xs font-bold text-slate-800 dark:text-slate-200 ml-2">Section {{ s.section }}</span>
        </div>
        <div class="text-slate-500 dark:text-slate-400 text-[11px] truncate mt-0.5">{{ s.title }}</div>
      </div>
      <!-- Selection Hint Badge -->
      <div class="hidden sm:flex items-center gap-1.5 flex-shrink-0">
        <kbd
          class="inline-flex items-center gap-0.5 px-1.5 py-0.5 text-[9px] font-sans font-bold bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded shadow-sm text-slate-400 dark:text-slate-500 group-hover:text-accent dark:group-hover:text-accent group-hover:border-accent/30 transition-all">
          Select <span class="text-[8px]">↵</span>
        </kbd>
      </div>
    </div>
  </div>
</div>
