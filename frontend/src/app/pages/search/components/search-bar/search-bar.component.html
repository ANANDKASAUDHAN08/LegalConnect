<div class="flex items-center gap-1.5 md:gap-3 w-full relative">
  <!-- Slot to project the back button from parent if passed -->
  <ng-content select="[back-btn]"></ng-content>

  <div
    class="search-bar-container card shadow-md bg-white dark:bg-slate-950/90 border border-slate-200 dark:border-slate-800/80 transition-all duration-300 hover:shadow-lg hover:border-blue-400 dark:hover:border-blue-800/70 focus-within:border-blue-500 focus-within:ring-2 md:focus-within:ring-4 focus-within:ring-blue-500/10 dark:focus-within:border-blue-600 dark:focus-within:ring-blue-600/15 relative rounded-xl z-50 flex-grow"
    [ngClass]="size === 'compact' ? 'p-1 md:p-1.5' : 'p-1 md:p-2' + (size === 'normal' ? ' md:p-2.5' : '')">

    <div class="flex flex-row gap-2 items-center relative z-50">
      <!-- Query input area -->
      <div class="relative flex-1 flex items-center"
        [ngClass]="size === 'compact' ? 'min-h-[36px] md:min-h-[46px]' : 'min-h-[40px] md:min-h-[48px]'">
        <span class="absolute left-3 opacity-60">
          <svg class="w-4 h-4 text-slate-400 dark:text-slate-500" fill="none" stroke="currentColor" stroke-width="2.5"
            viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </span>
        <input type="text" [ngModel]="query" (ngModelChange)="onQueryChange($event)" (focus)="onFocus()"
          (keyup.enter)="performSearch()" placeholder="e.g. 'cheque bounce', 'tenant eviction', 'FIR rights'..."
          class="w-full pl-9 pr-4 md:pr-16 py-1 md:py-2 rounded-xl bg-transparent border-0 text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 text-sm focus:outline-none focus:ring-0">

        <!-- Voice controls -->
        <div class="hidden md:flex absolute right-2 items-center gap-1.5">
          <button (click)="setVoiceLanguage(voiceLanguage === 'ENG' ? 'HI' : 'ENG')" [disabled]="isOffline"
            [class.opacity-40]="isOffline" [class.pointer-events-none]="isOffline"
            class="text-[9px] font-black border border-slate-200 dark:border-slate-700 px-2 py-0.5 rounded bg-slate-100 dark:bg-slate-800 text-accent dark:text-accent/90 transition-colors hover:bg-slate-200 dark:hover:bg-slate-700 cursor-pointer"
            [appTooltip]="isOffline ? 'Requires active internet connection' : 'Switch dictation language'"
            tooltipPlacement="top">
            {{ voiceLanguage }}
          </button>

          <button (click)="toggleVoiceRecording()" [disabled]="isOffline"
            [ngClass]="isRecording ? 
              'bg-red-500 text-white recording-pulse border-transparent' : 
              (isOffline ? 'bg-red-50/20 dark:bg-red-950/10 text-red-300 dark:text-red-650 opacity-40 border-slate-200/20' : 'bg-red-50/60 dark:bg-red-950/20 text-red-500 dark:text-red-400 border-red-200/50 dark:border-red-900/40 hover:bg-red-100 dark:hover:bg-red-950/50 hover:text-red-600 dark:hover:text-red-300 hover:border-red-300 dark:hover:border-red-800')"
            class="w-7 h-7 rounded-full flex items-center justify-center border transition-all cursor-pointer animate-fade-in"
            [appTooltip]="isOffline ? 'Requires active internet connection' : 'Voice search'" tooltipPlacement="top">

            <!-- Mic Icon (Default State) -->
            <svg *ngIf="!isRecording" class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5"
              viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
            </svg>

            <!-- Stop Icon (Listening State) -->
            <svg *ngIf="isRecording" class="w-2.5 h-2.5" fill="currentColor" viewBox="0 0 24 24">
              <rect x="4" y="4" width="16" height="16" rx="3" />
            </svg>

          </button>
        </div>
      </div>

      <!-- Beautiful Vertical Divider Line -->
      <div class="hidden md:block w-px h-5 bg-slate-200 dark:bg-slate-800/60 self-center"></div>

      <!-- Actions -->
      <div class="hidden md:flex gap-1.5 items-center justify-end shrink-0">
        <!-- OCR scan label -->
        <label [ngClass]="[
            size === 'compact' ? 'w-10 h-10' : 'w-10 h-10 md:w-11 md:h-11',
            (loading || isOffline) ? 'pointer-events-none opacity-40' : 'cursor-pointer'
          ]"
          class="rounded-xl flex items-center justify-center border border-slate-200 dark:border-slate-800 bg-slate-50/70 dark:bg-slate-900 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors shadow-2xs shrink-0"
          [appTooltip]="isOffline ? 'Requires active internet connection' : 'Scan a notice/FIR via OCR'"
          tooltipPlacement="top">
          <svg class="w-4 h-4 text-slate-500 dark:text-slate-400" fill="none" stroke="currentColor" stroke-width="2.2"
            viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          <input type="file" (change)="triggerOcrScan($event)" [disabled]="loading || isOffline" class="hidden"
            accept="image/*,application/pdf">
        </label>
        <button
          class="btn btn-accent px-3.5 md:px-6 rounded-xl text-xs font-black shadow-xs flex-shrink-0 cursor-pointer flex items-center justify-center"
          (click)="performSearch()" [disabled]="loading" [ngClass]="size === 'compact' ? 'h-10' : 'h-10 md:h-11'"
          appTooltip="Search across all legal categories" tooltipPlacement="top">
          Search
        </button>
      </div>
    </div>
  </div>

  <!-- Autocomplete Suggestions Panel -->
  <div *ngIf="showSuggestions && query.trim().length >= 2"
    class="suggestions-panel absolute left-0 right-0 top-full mt-1 z-[100] bg-white dark:bg-slate-900 shadow-lg md:shadow-2xl md:max-h-80 overflow-y-auto scrollbar-none animate-scale-up border-y border-slate-200/80 dark:border-slate-800/60 border rounded-lg md:rounded-xl mt-1.5"
    [ngClass]="size === 'compact' ? 'md:left-[3.75rem] max-h-[55vh]' : 'max-h-[35vh]'">

    <!-- Compact Sticky Header -->
    <div
      class="sticky top-0 z-10 px-3 md:px-4 py-1.5 md:py-2 border-b border-slate-100 dark:border-slate-800/40 bg-white/95 dark:bg-slate-900/95 backdrop-blur-sm flex items-center justify-between">
      <span
        class="text-[9px] md:text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Suggestions</span>
      <span
        class="text-[10px] font-bold text-slate-600 dark:text-slate-300 tabular-nums bg-slate-100 dark:bg-slate-800/60 px-2 py-0.5 rounded-full">{{
        suggestions.length }}
      </span>
    </div>

    <!-- 1. Loading State -->
    <div *ngIf="isSearchingSuggestions" class="px-4 py-8 text-center text-slate-500 dark:text-slate-400">
      <div class="animate-spin h-5 w-5 border-2 border-indigo-500 border-t-transparent rounded-full mx-auto mb-2"></div>
      <span class="text-xs font-semibold">Searching database...</span>
    </div>

    <!-- 2. Suggestion Items List -->
    <div *ngIf="suggestions.length > 0 && !isSearchingSuggestions">
      <div *ngFor="let s of suggestions; let i = index; trackBy: trackBySuggestion" (click)="selectSuggestion(s)"
        class="group flex items-center gap-2 md:gap-3 px-3 md:px-4 py-2.5 md:py-2.5 cursor-pointer transition-all duration-150 hover:bg-accent/[0.04] dark:hover:bg-slate-800/50 border-b border-slate-100/60 dark:border-slate-800/25 last:border-0 border-l-[3px] border-l-transparent hover:border-l-accent active:bg-accent/[0.07]">

        <!-- Color-coded icon (desktop only — mobile doesn't need it) -->
        <div class="hidden md:flex items-center justify-center w-7 h-7 rounded-lg shrink-0 transition-colors" [ngClass]="{
            'bg-blue-50 dark:bg-blue-500/10 text-blue-500 dark:text-blue-400': s.category === 'criminal',
            'bg-emerald-50 dark:bg-emerald-500/10 text-emerald-500 dark:text-emerald-400': s.category === 'evidence',
            'bg-amber-50 dark:bg-amber-500/10 text-amber-500 dark:text-amber-400': s.category === 'general'
          }">
          <!-- Case 1: Criminal Acts (Scales of Justice) -->
          <svg *ngIf="s.category === 'criminal'" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m16 16 3-8 3 8c-.87.65-2.24 1-3 1s-2.13-.35-3-1Z" />
            <path d="m2 16 3-8 3 8c-.87.65-2.24 1-3 1s-2.13-.35-3-1Z" />
            <path d="M7 21h10" />
            <path d="M12 3v18" />
            <path d="M3 7h18" />
          </svg>

          <!-- Case 2: Evidence Acts (Document with Magnifying Glass) -->
          <svg *ngIf="s.category === 'evidence'" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
            <polyline points="14 2 14 8 20 8" />
            <circle cx="10" cy="13" r="2.5" />
            <line x1="11.8" y1="14.8" x2="15" y2="18" />
          </svg>

          <!-- Case 3: Civil & General Acts (Book Outline) -->
          <svg *ngIf="s.category === 'general'" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
          </svg>
        </div>

        <!-- Content -->
        <div class="flex-grow min-w-0">
          <div class="flex items-center gap-1.5">
            <!-- Act Badge -->
            <span
              class="inline-flex items-center px-1.5 py-px rounded text-[8px] md:text-[9px] font-extrabold uppercase tracking-wider max-w-[72px] md:max-w-[120px] truncate shrink-0"
              [ngClass]="{
                'bg-blue-500/10 text-blue-600 dark:text-blue-400 border border-blue-500/15 dark:border-blue-500/20': s.category === 'criminal',
                'bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 border border-emerald-500/15 dark:border-emerald-500/20': s.category === 'evidence',
                'bg-amber-500/10 text-amber-600 dark:text-amber-400 border border-amber-500/15 dark:border-amber-500/20': s.category === 'general'
              }">
              {{ s.cleanedAct }}
            </span>
            <!-- Section Number -->
            <span class="text-[12px] md:text-xs font-bold text-slate-800 dark:text-slate-200 whitespace-nowrap">§ {{
              s.section }}</span>
          </div>
          <!-- Title -->
          <p class="text-slate-500 dark:text-slate-400 text-[10.5px] md:text-[11px] leading-snug mt-0.5 line-clamp-1 m-0" [innerHTML]="s.title"></p>
        </div>

        <!-- Mobile: Chevron for tap affordance -->
        <svg
          class="w-3.5 h-3.5 text-slate-300 dark:text-slate-600 shrink-0 md:hidden transition-colors group-hover:text-accent"
          fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
        </svg>

        <!-- Desktop: Select hint -->
        <div
          class="hidden md:flex items-center shrink-0 opacity-0 group-hover:opacity-100 transition-opacity duration-150">
          <kbd
            class="inline-flex items-center gap-0.5 px-1.5 py-0.5 text-[9px] font-sans font-bold bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded shadow-sm text-slate-400 dark:text-slate-500 group-hover:text-accent dark:group-hover:text-accent group-hover:border-accent/30 transition-all">
            Select <span class="text-[8px]">↵</span>
          </kbd>
        </div>
      </div>
    </div>

    <!-- 3. Empty State -->
    <div *ngIf="suggestions.length === 0 && !isSearchingSuggestions" class="px-4 py-7 text-center text-slate-500 dark:text-slate-400 flex flex-col items-center justify-center">
      <svg class="w-8 h-8 text-slate-350 dark:text-slate-650 opacity-55 mb-2" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
      <span class="text-xs font-black">No matching sections found</span>
      <p class="text-[9px] md:text-[10px] text-slate-450 dark:text-slate-550 mt-1 leading-normal max-w-xs m-0">
        We couldn't find any sections matching your query. Verify spelling or try typing a code name (e.g. BNS, IPC).
      </p>
    </div>

  </div>
</div>

<!-- Mobile Under-Bar Utility Pill Row -->
<div *ngIf="showPills" class="grid grid-cols-3 gap-1.5 mt-2 px-0 md:hidden animate-fade-in w-full">
  <!-- Language Pill (Clean Slate Glassmorphic) -->
  <button [disabled]="loading || isOffline" (click)="setVoiceLanguage(voiceLanguage === 'ENG' ? 'HI' : 'ENG')"
    [class.opacity-40]="isOffline" [class.pointer-events-none]="isOffline"
    [appTooltip]="isOffline ? 'Requires active internet connection' : 'Switch dictation language'"
    tooltipPlacement="top"
    class="h-7 flex items-center justify-center gap-2 px-1.5 rounded-xl border border-slate-200/40 dark:border-slate-800/50 bg-slate-50/50 dark:bg-slate-900/40 text-[10px] font-black text-slate-600 dark:text-slate-300 hover:bg-slate-100/60 dark:hover:bg-slate-800/50 transition-all cursor-pointer active:scale-95 whitespace-nowrap shadow-3xs disabled:opacity-50">
    <!-- Globe SVG -->
    <svg class="w-3.5 h-3.5 text-blue-500 dark:text-blue-400 shrink-0" fill="none" stroke="currentColor"
      stroke-width="2.2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 013 12c0-.778.099-1.533.284-2.253" />
    </svg>
    <span
      [ngClass]="voiceLanguage === 'ENG' ? 'text-cyan-500 dark:text-cyan-400' : 'text-amber-500 dark:text-amber-400'">{{
      voiceLanguage === 'ENG' ? 'English' : 'हिंदी' }}</span>
  </button>

  <!-- Voice Dictation Pill (Neutral gray base, bright red active state) -->
  <button [disabled]="loading || isOffline" (click)="toggleVoiceRecording()" [class.opacity-40]="isOffline"
    [class.pointer-events-none]="isOffline"
    [appTooltip]="isOffline ? 'Requires active internet connection' : 'Voice search'" tooltipPlacement="top"
    [ngClass]="isRecording ? 
      'bg-red-600 text-white border-transparent shadow-sm' : 
      'bg-slate-50/50 dark:bg-slate-900/40 border-slate-200/40 dark:border-slate-800/50 text-slate-600 dark:text-slate-300 hover:bg-slate-100/60 dark:hover:bg-slate-800/50'"
    class="h-7 flex items-center justify-center gap-1 px-1.5 rounded-xl border transition-all cursor-pointer active:scale-95 whitespace-nowrap shadow-3xs text-[10px] font-black">
    <!-- Mic SVG (Rose/red icon accent when inactive, white when active) -->
    <svg class="w-3.5 h-3.5 shrink-0" [ngClass]="isRecording ? 'text-white' : 'text-rose-500 dark:text-rose-400'"
      fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z" />
    </svg>
    <span>{{ isRecording ? 'Listening...' : 'Voice Search' }}</span>
  </button>

  <!-- OCR Scan Pill (Subtle emerald camera accent) -->
  <label [ngClass]="(loading || isOffline) ? 'pointer-events-none opacity-40' : 'cursor-pointer'"
    [appTooltip]="isOffline ? 'Requires active internet connection' : 'Scan a document via OCR'" tooltipPlacement="top"
    class="h-7 flex items-center justify-center gap-1 px-1.5 rounded-xl border border-slate-200/40 dark:border-slate-800/50 bg-slate-50/50 dark:bg-slate-900/40 text-[10px] font-black text-slate-600 dark:text-slate-300 hover:bg-slate-100/60 dark:hover:bg-slate-800/50 transition-all active:scale-95 whitespace-nowrap shadow-3xs">
    <!-- Camera SVG -->
    <svg class="w-3.5 h-3.5 text-emerald-500 dark:text-emerald-400 shrink-0" fill="none" stroke="currentColor"
      stroke-width="2.2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" />
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z" />
    </svg>
    <span>Scan Doc</span>
    <input type="file" (change)="triggerOcrScan($event)" [disabled]="loading || isOffline" class="hidden"
      accept="image/*,application/pdf">
  </label>
</div>
