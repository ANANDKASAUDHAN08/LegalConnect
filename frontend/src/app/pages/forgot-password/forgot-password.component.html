<div [class.auth-page]="!isModal" [class.min-h-screen]="!isModal" [class.flex]="!isModal"
  [class.items-center]="!isModal" [class.justify-center]="!isModal" [class.p-4]="!isModal" [class.sm:p-6]="!isModal"
  [class.bg-bgBase]="!isModal" [class.pt-[76px]]="!isModal" [class.relative]="!isModal"
  [class.overflow-hidden]="!isModal">
  <!-- Background Orbs (Cohesive with main auth page) -->
  <ng-container *ngIf="!isModal">
    <div class="bg-orb bg-orb-1" aria-hidden="true"></div>
    <div class="bg-orb bg-orb-2" aria-hidden="true"></div>
    <div class="bg-orb bg-orb-3" aria-hidden="true"></div>
  </ng-container>

  <div (click)="$event.stopPropagation()"
    [class]="isModal 
      ? 'w-full max-w-[440px] p-6 sm:p-8 bg-white dark:bg-slate-900 border border-slate-200 dark:border-white/5 rounded-2xl shadow-2xl relative z-10 flex flex-col gap-5 sm:gap-6'
      : 'auth-card w-full max-w-[440px] p-6 sm:p-8 bg-white/80 dark:bg-slate-900/60 border border-white/30 dark:border-white/5 rounded-2xl backdrop-blur-xl shadow-2xl relative z-10 flex flex-col gap-6 sm:gap-8'">

    <!-- Close Button for Modal -->
    <button *ngIf="isModal" type="button" (click)="close.emit()"
      class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors p-1"
      aria-label="Close modal">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>

    <div class="auth-header flex flex-col items-center text-center gap-3">
      <!-- <a routerLink="/" class="text-4xl mb-1 hover:scale-105 transition-transform" *ngIf="!isModal">⚖️</a> -->
      <!-- <div class="text-3xl" *ngIf="isModal">⚖️</div> -->
      <h1 class="text-xl sm:text-2xl font-extrabold text-slate-900 dark:text-white tracking-tight m-0">Reset Password
      </h1>
      <p class="text-xs sm:text-sm text-slate-500 dark:text-slate-400 m-0">Enter your email and we'll send you
        instructions to reset your password.</p>
    </div>

    <div *ngIf="!submitted(); else successState" @fadeSlide>
      <form (ngSubmit)="onSubmit()" class="flex flex-col gap-4">

        <!-- Email field -->
        <div class="space-y-1.5">
          <label for="reset-email" class="text-xs font-semibold text-slate-700 dark:text-slate-300">Email
            Address</label>
          <div class="relative">
            <span
              class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 flex items-center z-10 pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M3 8l7.89 5.26a2 2 0 002-2v-10a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
              </svg>
            </span>
            <input id="reset-email" type="email" [(ngModel)]="email" name="email"
              class="w-full pl-11 pr-4 py-2.5 bg-slate-50 hover:bg-slate-100/70 dark:bg-white/5 dark:hover:bg-white/8 border border-slate-200/80 dark:border-white/10 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 transition-all duration-200"
              placeholder="name@example.com" autocomplete="email" required>
          </div>
        </div>

        <!-- Submit button -->
        <button type="submit" [disabled]="loading() || !email"
          class="w-full py-2.5 px-4 bg-slate-900 hover:bg-slate-950 dark:bg-amber-600 dark:hover:bg-amber-500 text-white font-semibold rounded-xl text-sm transition-all duration-200 flex items-center justify-center gap-2 shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
          <span *ngIf="!loading()">Send Reset Link</span>
          <span *ngIf="loading()" class="flex items-center justify-center gap-2">
            <span class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span> Sending
            Link…
          </span>
        </button>
      </form>
    </div>

    <!-- Success state template -->
    <ng-template #successState>
      <div @fadeSlide class="text-center flex flex-col gap-4 py-2">
        <div
          class="w-12 h-12 bg-green-500/10 text-green-600 dark:text-green-400 rounded-full flex items-center justify-center mx-auto text-xl font-bold shadow-sm animate-bounce">
          ✓
        </div>
        <div class="flex flex-col gap-1.5">
          <h3 class="text-md sm:text-lg font-bold text-slate-900 dark:text-white">Check your email</h3>
          <p class="text-xs sm:text-sm text-slate-500 dark:text-slate-400 leading-relaxed">
            We've sent password reset instructions to:<br>
            <span
              class="text-slate-900 dark:text-white font-bold underline decoration-amber-500 decoration-2 underline-offset-4">{{email}}</span>
          </p>
        </div>
        <button (click)="submitted.set(false)"
          class="text-amber-600 hover:text-amber-500 font-bold text-xs bg-transparent border-none p-0 cursor-pointer hover:underline mt-2">
          Didn't receive email? Try again
        </button>
      </div>
    </ng-template>

    <!-- <div class="text-center pt-2 border-t border-slate-100 dark:border-white/5">
      <a *ngIf="!isModal" routerLink="/login" class="text-slate-500 dark:text-slate-400 hover:text-amber-600 dark:hover:text-amber-400 transition-colors text-xs font-bold no-underline">
        ← Back to Sign In
      </a>
      <button *ngIf="isModal" type="button" (click)="close.emit()" class="text-slate-500 dark:text-slate-400 hover:text-amber-600 dark:hover:text-amber-400 transition-colors text-xs font-bold bg-transparent border-none p-0 cursor-pointer">
        ← Back to Sign In
      </button>
    </div> -->
  </div>
</div>
