<div class="auth-page min-h-screen flex items-center justify-center p-6 bg-[#0d1526] pt-[72px] relative overflow-hidden">
  <!-- Background Orbs -->
  <div class="bg-orb bg-orb-1 opacity-20"></div>
  <div class="bg-orb bg-orb-2 opacity-10"></div>

  <div class="auth-card card p-8 md:p-12 w-full max-w-[440px] flex flex-col gap-8 relative z-10 bg-white/5 border-white/10 backdrop-blur-xl rounded-[24px]">
    <div class="auth-header flex flex-col items-center text-center gap-3">
      <a routerLink="/" class="text-4xl mb-2">⚖️</a>
      <h1 class="text-3xl font-bold text-white">Reset Password</h1>
      <p class="text-slate-400">Enter your email and we'll send you instructions to reset your password.</p>
    </div>

    <div *ngIf="!submitted(); else successState" @fadeSlide>
      <form (ngSubmit)="onSubmit()" class="space-y-6">
        <div class="form-group">
          <label class="form-label text-slate-400">Email Address</label>
          <input 
            type="email" 
            [(ngModel)]="email" 
            name="email" 
            class="form-control bg-white/5 border-white/10 text-white placeholder:text-slate-600" 
            placeholder="name@example.com"
            required>
        </div>
        
        <button type="submit" [disabled]="loading() || !email" class="btn btn-accent w-full py-4 text-lg shadow-xl shadow-gold/20">
          {{loading() ? 'Sending Link...' : 'Send Reset Link'}}
        </button>
      </form>
    </div>

    <ng-template #successState>
      <div @fadeSlide class="text-center space-y-6">
        <div class="w-16 h-16 bg-green-500/20 text-green-500 rounded-full flex items-center justify-center mx-auto text-2xl">
          ✓
        </div>
        <div class="space-y-2">
          <h2 class="text-xl font-bold text-white">Check your email</h2>
          <p class="text-slate-400">We've sent password reset instructions to <br><span class="text-white font-semibold">{{email}}</span></p>
        </div>
        <button (click)="submitted.set(false)" class="text-gold font-bold hover:underline">Didn't receive email? Try again</button>
      </div>
    </ng-template>

    <div class="text-center">
      <a routerLink="/auth" [queryParams]="{tab: 'login'}" class="text-slate-400 hover:text-white transition-colors text-sm font-medium">
        ← Back to Sign In
      </a>
    </div>
  </div>
</div>
