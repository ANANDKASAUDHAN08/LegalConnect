<div *ngIf="snackbarService.snackbar() as snackbar"
  class="snackbar-container fixed bottom-8 left-1/2 -translate-x-1/2 z-[9999] transition-all duration-300"
  [class.show]="snackbar.show" [class.hide]="!snackbar.show">

  <div
    class="snackbar flex items-center justify-between gap-4 sm:gap-6 px-4 py-2.5 sm:px-5 sm:py-3.5 rounded-xl shadow-lg w-max max-w-[92vw] sm:max-w-fit"
    [ngClass]="{
         'bg-[#27ae60] text-white': snackbar.type === 'success',
         'bg-[#e74c3c] text-white': snackbar.type === 'error',
         'bg-[#2980b9] text-white': snackbar.type === 'info',
         'bg-[#f59e0b] text-[#1f2937]': snackbar.type === 'warning'
       }">

    <!-- Message -->
    <p class="message font-medium text-[13.5px] sm:text-[15px] tracking-wide leading-snug">{{ snackbar.message }}</p>

    <!-- Optional Action Button -->
    <button *ngIf="snackbar.actionLabel" (click)="snackbarService.runAction()"
      class="shrink-0 font-extrabold text-[12px] sm:text-[13px] underline underline-offset-2 opacity-90 hover:opacity-100 cursor-pointer bg-transparent border-none transition-opacity whitespace-nowrap"
      [ngClass]="{'text-[#1f2937]': snackbar.type === 'warning', 'text-white': snackbar.type !== 'warning'}">
      {{ snackbar.actionLabel }}
    </button>

    <!-- Close Button -->
    <button (click)="snackbarService.hide()"
      class="opacity-70 hover:opacity-100 transition-opacity text-lg sm:text-xl font-bold leading-none -mt-0.5 shrink-0 bg-transparent border-none cursor-pointer"
      [ngClass]="{'text-[#1f2937]': snackbar.type === 'warning', 'text-white': snackbar.type !== 'warning'}"
      aria-label="Close">
      ✕
    </button>
  </div>
</div>
