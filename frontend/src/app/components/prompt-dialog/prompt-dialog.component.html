<div *ngIf="isOpen" class="fixed inset-0 z-[2100] flex items-center justify-center p-4">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-black/60 backdrop-blur-xs" (click)="onCancel()"></div>

  <!-- Modal Content Box -->
  <div
    class="relative w-full max-w-md bg-white dark:bg-slate-900 rounded-2xl p-5 sm:p-6 shadow-2xl z-10 space-y-5 border border-slate-200/40 dark:border-slate-800 animate-[scaleUp_0.2s_ease-out]">
    <div>
      <h3 class="font-serif text-base font-bold text-slate-900 dark:text-white">{{ title }}</h3>
      <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">{{ label }}</p>
    </div>

    <div>
      <input type="text" [(ngModel)]="value" (keyup.enter)="onSubmit()"
        class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl text-xs text-slate-900 dark:text-white outline-none focus:border-indigo-500" />
    </div>

    <div class="flex justify-end gap-3 pt-2">
      <button (click)="onCancel()"
        class="px-4 py-2 border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/60 text-slate-600 dark:text-slate-400 rounded-xl text-xs font-bold transition-all bg-transparent cursor-pointer">
        Cancel
      </button>
      <button (click)="onSubmit()"
        class="px-4 py-2 bg-indigo-650 hover:bg-indigo-600 text-white rounded-xl text-xs font-bold transition-all shadow-md active:scale-95 border-0 cursor-pointer">
        Submit
      </button>
    </div>
  </div>
</div>
