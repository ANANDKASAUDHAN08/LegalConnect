<div [id]="'review-' + review.id"
  [class.highlight-glow]="highlightGlow"
  class="card p-4 sm:p-5 lg:p-6 bg-white/70 dark:bg-slate-900/60 border border-slate-200/50 dark:border-slate-800/80 rounded-2xl flex flex-col gap-3 shadow-sm hover:shadow-md transition-all duration-300 h-full justify-between">

  <!-- Header: Author Name & Admin Controls -->
  <div class="flex items-start justify-between gap-2.5 border-b border-slate-100 dark:border-slate-800 pb-2.5">
    <div class="flex items-center gap-2 min-w-0">
      <div class="w-7 h-7 rounded-full bg-blue-500/10 dark:bg-slate-800 text-blue-600 dark:text-slate-400 flex items-center justify-center font-extrabold text-[10px] flex-shrink-0">
        {{ review.authorName.replace('Adv. ', '').substring(0, 2).toUpperCase() }}
      </div>
      <div class="min-w-0 flex-grow">
        <span class="block text-xs font-bold text-slate-855 dark:text-white truncate">{{ review.authorName }}</span>
        <span class="block text-[9px] text-slate-455 dark:text-slate-500 font-bold uppercase tracking-wider mt-0.5">{{ review.userRole }}</span>
      </div>
    </div>

    <div class="flex items-center gap-1 flex-shrink-0">
      <!-- Edit/Delete (If Current User owns the review) -->
      <button *ngIf="currentUser && review.userId === currentUser.id" (click)="$event.stopPropagation(); edit.emit(review)"
        title="Edit Review"
        class="p-1 text-slate-400 hover:text-blue-500 dark:hover:text-blue-400 transition-colors outline-none cursor-pointer">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.897L16.863 4.487zm0 0L19.5 7.125" />
        </svg>
      </button>
      <button *ngIf="currentUser && review.userId === currentUser.id" (click)="$event.stopPropagation(); delete.emit(review)"
        title="Delete Review"
        class="p-1 text-slate-400 hover:text-rose-500 dark:hover:text-rose-400 transition-colors outline-none cursor-pointer">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
      </button>
      <!-- Verified Badge -->
      <span class="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-[8px] font-bold text-emerald-600 dark:text-emerald-400">
        <svg class="w-2 h-2 text-emerald-500" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
        </svg>
        <span>Verified</span>
      </span>
    </div>
  </div>

  <!-- Rating Stars & Target Info -->
  <div class="flex items-center justify-between mt-0.5">
    <div class="flex items-center gap-0.5">
      <span *ngFor="let s of [1,2,3,4,5]"
        [class]="s <= review.rating ? 'text-amber-400' : 'text-slate-200 dark:text-slate-800'" class="text-xs">★</span>
    </div>
    <span class="text-[8px] font-bold uppercase tracking-widest text-slate-455 dark:text-slate-550 truncate max-w-[120px] sm:max-w-[150px]"
      title="Target: {{ review.targetName }}">
      Target: {{ review.targetName }}
    </span>
  </div>

  <!-- Review Description -->
  <p [class.line-clamp-3]="showReadMore"
    class="text-[11px] sm:text-xs text-slate-650 dark:text-slate-400 leading-relaxed font-medium mt-0.5 flex-grow">
    "{{ getFormattedContent(review.content) }}"
  </p>

  <!-- Footer Info -->
  <div class="flex items-center justify-between mt-auto pt-2 border-t border-slate-100/50 dark:border-slate-850/40">
    <div class="flex items-center gap-3">
      <!-- Like Action -->
      <button (click)="$event.stopPropagation(); onLike()"
        [class]="hasLiked ? 'text-blue-500 dark:text-blue-400' : 'text-slate-400 hover:text-blue-500 dark:hover:text-blue-400'"
        class="flex items-center gap-1.5 transition-all outline-none text-xs md:text-sm font-bold cursor-pointer">
        <svg class="w-4 h-4 md:w-5 md:h-5" [class.fill-blue-500]="hasLiked" [class.dark:fill-blue-400]="hasLiked" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3" />
        </svg>
        <span>{{ review.likes || 0 }}</span>
      </button>

      <!-- Optional Read More for Carousel -->
      <button *ngIf="showReadMore && review.content.length > 110" (click)="$event.stopPropagation(); readMore.emit(review)"
        class="text-[10px] font-bold text-blue-600 dark:text-blue-400 hover:underline outline-none cursor-pointer">
        Read More →
      </button>
    </div>

    <!-- Date (If not in line-clamped mode) -->
    <span *ngIf="!showReadMore" class="text-[8px] sm:text-[9px] text-slate-400 dark:text-slate-600 font-semibold">
      {{ review.createdAt | date:'mediumDate' }}
    </span>
  </div>
</div>
