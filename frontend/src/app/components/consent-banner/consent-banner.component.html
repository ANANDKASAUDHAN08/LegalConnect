<!-- Consent Banner — Premium floating card (Stripe/Linear inspired) -->
<div *ngIf="showBanner()" class="consent-banner-wrapper" [@bannerAnimation]>

  <!-- Subtle top accent line -->
  <div class="consent-accent-bar"></div>

  <div class="consent-inner">

    <!-- Description -->
    <p class="consent-description">
      We use cookies and similar technologies for essential operations, analytics, and personalized content.
      You can manage your preferences at any time.
    </p>

    <!-- Action buttons -->
    <div class="consent-actions">
      <a routerLink="/cookie-preferences" class="consent-link"
        appTooltip="Configure granular data processing preferences">
        Manage preferences
      </a>
      <div class="consent-btn-group">
        <button (click)="rejectAll()" class="consent-btn consent-btn-secondary"
          appTooltip="Decline optional cookies — only essential ones will be used">
          Decline
        </button>
        <button (click)="acceptAll()" class="consent-btn consent-btn-primary"
          appTooltip="Accept analytics and personalization cookies">
          Accept all
        </button>
      </div>
    </div>

  </div>
</div>
