<div *ngIf="isOpen" class="fixed inset-0 z-[2100] flex items-center justify-center p-4">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-black/60 backdrop-blur-xs" (click)="onCancel()"></div>

  <!-- Modal Content Box -->
  <div
    class="relative w-full max-w-md bg-white dark:bg-slate-900 rounded-2xl p-5 sm:p-6 shadow-2xl z-10 space-y-5 border border-slate-200/40 dark:border-slate-800 animate-[scaleUp_0.2s_ease-out]">
    <div class="flex items-start gap-3.5">
      <!-- Icon indicator -->
      <div class="p-2 rounded-xl shrink-0"
        [class]="type === 'danger' ? 'bg-red-50 text-red-650 dark:bg-red-950/20 dark:text-red-400' : 'bg-amber-50 text-amber-600 dark:bg-amber-950/20 dark:text-amber-400'">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
      </div>
      <div class="space-y-1">
        <h3 class="text-sm font-bold text-slate-900 dark:text-white">{{ title }}</h3>
        <p class="text-xs text-slate-500 dark:text-slate-400 leading-relaxed">{{ message }}</p>
      </div>
    </div>

    <div class="flex justify-end gap-3 pt-2">
      <button (click)="onCancel()"
        class="px-4 py-2 border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/60 text-slate-600 dark:text-slate-400 rounded-xl text-xs font-bold transition-all bg-transparent cursor-pointer">
        Cancel
      </button>
      <button (click)="onConfirm()"
        [class]="type === 'danger' ? 'bg-red-600 hover:bg-red-500 text-white' : 'bg-indigo-650 hover:bg-indigo-600 text-white'"
        class="px-4 py-2 rounded-xl text-xs font-bold transition-all shadow-md active:scale-95 border-0 cursor-pointer">
        Confirm
      </button>
    </div>
  </div>
</div>
