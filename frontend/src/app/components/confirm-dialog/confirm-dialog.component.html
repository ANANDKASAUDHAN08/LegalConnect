<div *ngIf="isOpen" class="fixed inset-0 z-[2100] flex items-center justify-center p-4">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-black/60 backdrop-blur-xs" (click)="onCancel()"></div>

  <!-- Modal Content Box -->
  <div
    class="relative w-full max-w-md bg-white dark:bg-slate-900 rounded-2xl p-5 sm:p-6 shadow-2xl z-10 space-y-5 border border-slate-200/40 dark:border-slate-800 animate-[scaleUp_0.2s_ease-out]">
    <div class="flex items-start gap-3.5">
      <!-- Icon indicator -->
      <div class="p-2 rounded-xl shrink-0 animate-scale-up"
        [ngClass]="type === 'danger' ? 'bg-red-50 text-red-600 dark:bg-red-950/20 dark:text-red-400' : (type === 'info' ? 'bg-blue-50 text-blue-600 dark:bg-blue-950/20 dark:text-blue-400' : 'bg-amber-50 text-amber-600 dark:bg-amber-950/20 dark:text-amber-400')">
        <ng-container [ngSwitch]="getIconName()">
          <!-- Trash/Delete Icon -->
          <svg *ngSwitchCase="'trash'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            <line x1="10" y1="11" x2="10" y2="17"></line>
            <line x1="14" y1="11" x2="14" y2="17"></line>
          </svg>
          <!-- Sync/Refresh/Switch Icon -->
          <svg *ngSwitchCase="'sync'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
          </svg>
          <!-- Info Icon -->
          <svg *ngSwitchCase="'info'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="16" x2="12" y2="12"></line>
            <line x1="12" y1="8" x2="12.01" y2="8"></line>
          </svg>
          <!-- Warning/Exclamation (Default) -->
          <svg *ngSwitchDefault xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
        </ng-container>
      </div>
      <div class="space-y-1">
        <h3 class="text-sm font-bold text-slate-900 dark:text-white">{{ title }}</h3>
        <p class="text-xs text-slate-500 dark:text-slate-400 leading-relaxed">{{ message }}</p>
      </div>
    </div>

    <div class="flex justify-end gap-3 pt-2">
      <button (click)="onCancel()"
        class="px-4 py-2 border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/60 text-slate-600 dark:text-slate-400 rounded-xl text-xs font-bold transition-all bg-transparent cursor-pointer">
        Cancel
      </button>
      <button (click)="onConfirm()"
        [ngClass]="type === 'danger' ? 'bg-red-600 hover:bg-red-500 text-white' : 'bg-indigo-600 hover:bg-indigo-500 text-white'"
        class="px-4 py-2 rounded-xl text-xs font-bold transition-all shadow-md active:scale-95 border-0 cursor-pointer">
        Confirm
      </button>
    </div>
  </div>
</div>
