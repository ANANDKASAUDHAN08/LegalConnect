<div class="modal-backdrop fixed inset-0 z-[2000] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm"
  (click)="onBackdropClick($event)">

  <div
    class="modal-card w-full max-w-[660px] bg-white dark:bg-slate-900 rounded-2xl shadow-2xl overflow-hidden flex flex-col"
    style="max-height: 90vh;">

    <!-- Header -->
    <div
      class="flex items-center justify-between px-5 py-4 border-b border-slate-100 dark:border-slate-800 flex-shrink-0">
      <div class="flex items-center gap-2.5">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
          class="text-blue-600 dark:text-blue-400">
          <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon>
          <line x1="8" y1="2" x2="8" y2="18"></line>
          <line x1="16" y1="6" x2="16" y2="22"></line>
        </svg>
        <h2 class="text-[1rem] font-bold text-slate-800 dark:text-white">Select Your Location</h2>
      </div>
      <button (click)="close()"
        class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-colors cursor-pointer">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- Search + GPS -->
    <div class="px-5 py-3 flex gap-3 flex-shrink-0">
      <div class="flex-1 relative">
        <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" stroke="currentColor"
          viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input id="modal-location-search" type="text" [(ngModel)]="searchQuery" placeholder="Search..."
          class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl py-2.5 pl-10 pr-3 text-sm text-slate-800 dark:text-white outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/10 transition-all placeholder-slate-400" />
      </div>
      <button (click)="useMyLocation()" [disabled]="isDetectingGps"
        class="flex items-center gap-2 px-4 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold transition-all cursor-pointer disabled:opacity-60 disabled:cursor-not-allowed flex-shrink-0 shadow-md shadow-blue-200 dark:shadow-blue-900/30">
        <svg *ngIf="!isDetectingGps" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path
            d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83">
          </path>
        </svg>
        <!-- Spinner while detecting -->
        <svg *ngIf="isDetectingGps" class="animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none"
          viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        <span>{{ isDetectingGps ? 'Detecting...' : 'Use My Location' }}</span>
      </button>
    </div>

    <!-- Map/Satellite tabs + Map -->
    <div class="relative flex-1 min-h-0">
      <!-- Tab switcher -->
      <div
        class="absolute top-3 left-3 z-10 flex bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-700 shadow-md overflow-hidden">
        <button (click)="setMapMode('map')" class="px-4 py-1.5 text-sm font-bold transition-colors cursor-pointer"
          [class.bg-white]="mapMode === 'map'" [class.dark:bg-slate-900]="mapMode === 'map'"
          [class.text-slate-900]="mapMode === 'map'" [class.dark:text-white]="mapMode === 'map'"
          [class.text-slate-500]="mapMode !== 'map'" [class.dark:text-slate-400]="mapMode !== 'map'">Map</button>
        <button (click)="setMapMode('satellite')"
          class="px-4 py-1.5 text-sm font-bold transition-colors cursor-pointer border-l border-slate-200 dark:border-slate-700"
          [class.bg-white]="mapMode === 'satellite'" [class.dark:bg-slate-900]="mapMode === 'satellite'"
          [class.text-slate-900]="mapMode === 'satellite'" [class.dark:text-white]="mapMode === 'satellite'"
          [class.text-slate-500]="mapMode !== 'satellite'"
          [class.dark:text-slate-400]="mapMode !== 'satellite'">Satellite</button>
      </div>

      <!-- Google Map container -->
      <div id="location-modal-map" class="w-full h-full min-h-[320px] bg-slate-100 dark:bg-slate-800"></div>

      <!-- Center crosshair hint -->
      <div class="absolute bottom-3 left-1/2 -translate-x-1/2 z-10 pointer-events-none">
        <span
          class="text-[0.72rem] font-semibold text-slate-600 dark:text-slate-300 bg-white/80 dark:bg-slate-900/80 backdrop-blur-sm px-2.5 py-1 rounded-full border border-slate-200 dark:border-slate-700 shadow">
          Click on map or drag the pin to select
        </span>
      </div>
    </div>

    <!-- Detected address bar -->
    <div
      class="px-5 py-3 flex items-center gap-2.5 border-t border-slate-100 dark:border-slate-800 flex-shrink-0 bg-slate-50 dark:bg-slate-900/80">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
        class="text-blue-600 dark:text-blue-400 flex-shrink-0">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
        <circle cx="12" cy="10" r="3"></circle>
      </svg>
      <div class="flex-1 min-w-0">
        <span *ngIf="isLoadingAddress || isDetectingGps"
          class="flex items-center gap-2 text-sm text-slate-500 dark:text-slate-400">
          <svg class="animate-spin w-3.5 h-3.5 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none"
            viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          <span>Getting address...</span>
        </span>
        <span *ngIf="!isLoadingAddress && !isDetectingGps && detectedAddress"
          class="text-sm font-semibold text-slate-800 dark:text-white truncate block">{{ detectedAddress }}</span>
        <span *ngIf="!isLoadingAddress && !isDetectingGps && !detectedAddress"
          class="text-sm text-slate-400 dark:text-slate-500 italic">Drag the pin to select a location</span>
      </div>
    </div>

    <!-- Footer buttons -->
    <div
      class="flex items-center justify-end gap-3 px-5 py-4 border-t border-slate-100 dark:border-slate-800 flex-shrink-0">
      <button (click)="close()"
        class="px-5 py-2.5 rounded-xl text-sm font-bold text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all cursor-pointer">
        Cancel
      </button>
      <button (click)="confirm()" [disabled]="!detectedAddress || isLoadingAddress"
        class="flex items-center gap-2 px-6 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold shadow-md shadow-blue-200 dark:shadow-blue-900/30 transition-all cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <span>Confirm Location</span>
      </button>
    </div>
  </div>
</div>
