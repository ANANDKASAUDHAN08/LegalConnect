<section
  class="section bg-white/40 dark:bg-slate-900/10 border-b border-slate-200/40 dark:border-slate-800/60 py-12 sm:py-20">
  <div class="container mx-auto px-4 sm:px-6">
    <div class="section-header text-center mb-8 sm:mb-12 flex flex-col items-center gap-4">
      <span class="badge badge-accent">Citizen Empowerment</span>
      <h2
        class="section-title text-2xl sm:text-3xl md:text-4xl font-extrabold tracking-tight text-text-primary dark:text-white">
        Instant Rights Checker
      </h2>
      <p class="section-subtitle text-slate-500 dark:text-slate-400 max-w-[560px] text-sm sm:text-base leading-relaxed">
        Quickly understand your fundamental legal protections and rights under Indian Law.
      </p>
    </div>

    <!-- Responsive Grid: 2 columns on mobile/tablet, 4 on desktop -->
    <div class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-4 gap-3.5 sm:gap-6">
      <button *ngFor="let card of rightsCards; let idx = index" (click)="toggleRightsCard(idx)"
        [ngClass]="selectedRightsCard === idx ? 'border-accent bg-accent/5 dark:bg-accent/10 shadow-md text-accent font-bold scale-[1.02]' : 'border-slate-200 dark:border-slate-800 hover:border-slate-350 dark:hover:border-slate-700 bg-white/70 dark:bg-slate-900/60 text-slate-700 dark:text-slate-300'"
        class="p-3.5 sm:p-6 rounded-2xl border flex flex-col items-center justify-center gap-2.5 sm:gap-3.5 text-center transition-all duration-300 hover:-translate-y-0.5 group shadow-sm w-full">

        <!-- SVG Icons -->
        <div
          [ngClass]="selectedRightsCard === idx ? 'text-accent' : 'text-slate-450 group-hover:text-slate-550 dark:group-hover:text-slate-300'"
          class="flex-shrink-0 transition-colors w-7 h-7 sm:w-8 sm:h-8 flex items-center justify-center">
          <!-- tenant -->
          <svg *ngIf="card.icon === 'tenant'" class="w-7 h-7 sm:w-8 sm:h-8" fill="none" stroke="currentColor"
            stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
          </svg>
          <!-- police -->
          <svg *ngIf="card.icon === 'police'" class="w-7 h-7 sm:w-8 sm:h-8" fill="none" stroke="currentColor"
            stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
          </svg>
          <!-- consumer -->
          <svg *ngIf="card.icon === 'consumer'" class="w-7 h-7 sm:w-8 sm:h-8" fill="none" stroke="currentColor"
            stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
          </svg>
          <!-- rti -->
          <svg *ngIf="card.icon === 'rti'" class="w-7 h-7 sm:w-8 sm:h-8" fill="none" stroke="currentColor"
            stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 .125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
          </svg>
        </div>

        <span
          class="text-[11px] sm:text-sm font-bold tracking-tight text-slate-800 dark:text-slate-200 leading-tight">{{
          card.title }}</span>
      </button>
    </div>

    <!-- Rights Detail Box (Full Width below grid) -->
    <div *ngIf="activeRightsCard !== null"
      class="fade-in-up mt-6 p-4 sm:p-6 rounded-2xl bg-white/85 dark:bg-slate-900/70 border border-accent/20 dark:border-accent/30 shadow-lg backdrop-blur-md transition-all duration-300">
      <div
        class="flex items-start justify-between gap-3 mb-3 border-b border-slate-200/50 dark:border-slate-800/55 pb-3">
        <span
          class="text-[10px] sm:text-xs font-bold text-accent uppercase tracking-widest bg-accent/10 px-2.5 py-1 rounded-full whitespace-normal leading-relaxed">
          Governing Law: {{ activeRightsCard.lawRef }}
        </span>
        <button (click)="selectedRightsCard = null"
          class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-350 p-1 flex-shrink-0">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <p class="text-xs sm:text-sm text-slate-700 dark:text-slate-300 leading-relaxed font-medium">
        {{ activeRightsCard.summary }}
      </p>
      <div class="mt-4 flex justify-end">
        <a [routerLink]="[activeRightsCard.link]"
          class="btn btn-primary btn-sm text-xs font-bold flex items-center gap-1.5 shadow-sm w-full sm:w-auto justify-center">
          <span>Read Governing Law Act</span>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
          </svg>
        </a>
      </div>
    </div>
  </div>
</section>
