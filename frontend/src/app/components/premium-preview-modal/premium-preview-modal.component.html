<div *ngIf="show" class="fixed inset-0 z-[100] flex items-center justify-center p-4">
  <!-- Modal Backdrop -->
  <div (click)="close()" class="fixed inset-0 bg-slate-950/40 backdrop-blur-md transition-opacity"></div>
  
  <!-- Modal Card -->
  <div class="relative w-full max-w-[500px] bg-white/95 dark:bg-slate-900/95 border border-slate-200/50 dark:border-slate-800/80 rounded-3xl p-6 sm:p-8 shadow-2xl backdrop-blur-xl transform transition-all fade-in-up flex flex-col gap-6">
    <!-- Close button -->
    <button (click)="close()" class="absolute right-4 top-4 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 p-1 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>

    <!-- Header & Icon -->
    <div class="flex items-center gap-4 mt-2">
      <div class="w-12 h-12 rounded-2xl bg-blue-500/10 text-blue-600 dark:text-blue-400 flex items-center justify-center text-2xl shrink-0">
        <span *ngIf="featureName === 'ai'">✨</span>
        <span *ngIf="featureName === 'templates'">📄</span>
      </div>
      <div>
        <span class="block text-[10px] font-bold text-blue-600 dark:text-blue-400 uppercase tracking-widest">Premium Portal Feature</span>
        <h3 class="text-xl font-bold text-slate-950 dark:text-white mt-0.5">{{ title }}</h3>
      </div>
    </div>

    <!-- Description -->
    <p class="text-sm text-slate-650 dark:text-slate-300 leading-relaxed font-medium">
      {{ desc }}
    </p>

    <!-- Visual Benefit Checklist -->
    <div class="flex flex-col gap-2.5 bg-slate-50/50 dark:bg-slate-950/30 border border-slate-100 dark:border-slate-850 p-4 rounded-2xl">
      <div class="flex items-start gap-2.5 text-xs text-slate-700 dark:text-slate-300">
        <svg class="w-4 h-4 text-emerald-500 shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
        </svg>
        <span>100% Free registration for citizens & clients</span>
      </div>
      <div class="flex items-start gap-2.5 text-xs text-slate-700 dark:text-slate-300">
        <svg class="w-4 h-4 text-emerald-500 shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
        </svg>
        <span>Securely upload files & download pre-formatted notices</span>
      </div>
      <div class="flex items-start gap-2.5 text-xs text-slate-700 dark:text-slate-300">
        <svg class="w-4 h-4 text-emerald-500 shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
        </svg>
        <span>Save bookmarks and historical search logs</span>
      </div>
    </div>

    <!-- Actions -->
    <div class="flex flex-col sm:flex-row gap-3 mt-2">
      <a routerLink="/register" (click)="close()" class="btn btn-primary flex-1 py-3 text-xs justify-center font-bold shadow-md">
        Create Free Account
      </a>
      <a routerLink="/login" (click)="close()" class="btn btn-outline flex-1 py-3 text-xs justify-center font-bold">
        Log In
      </a>
    </div>
  </div>
</div>
