<nav class="fixed top-0 left-0 right-0 z-[1000] py-4 bg-white dark:bg-slate-900 shadow-sm border-b border-slate-100 dark:border-slate-800 navbar-fixed">
  <div class="max-w-[1200px] mx-auto px-6 flex justify-between items-center w-full relative">
    
    <!-- LEFT: Logo Block (Exactly as in Reference Image) -->
    <a routerLink="/" class="flex items-center gap-3 no-underline">
      <!-- Circular "LC" Icon -->
      <div class="w-10 h-10 rounded-full bg-[#1e3a8a] dark:bg-blue-600 flex items-center justify-center text-white font-extrabold text-sm shadow-[0_2px_10px_rgba(30,58,138,0.2)]">
        LC
      </div>
      <div class="flex flex-col">
        <span class="text-base font-extrabold tracking-tight text-slate-900 dark:text-white leading-tight">LegalConnect</span>
        <span class="text-[0.68rem] text-slate-400 font-medium">Legal help made simple</span>
      </div>
    </a>

    <!-- CENTER: Navigation Links (Desktop Only - Exactly as in Reference Image) -->
    <div class="hidden md:flex items-center justify-center gap-8">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
         class="nav-link text-[0.92rem] font-bold text-slate-600 hover:text-blue-700 dark:text-slate-300 dark:hover:text-white transition-colors no-underline">
        Home
      </a>
      <a routerLink="/lawyers" routerLinkActive="active" 
         class="nav-link text-[0.92rem] font-bold text-slate-600 hover:text-blue-700 dark:text-slate-300 dark:hover:text-white transition-colors no-underline">
        Find Lawyers
      </a>
      <a routerLink="/laws" routerLinkActive="active" 
         class="nav-link text-[0.92rem] font-bold text-slate-600 hover:text-blue-700 dark:text-slate-300 dark:hover:text-white transition-colors no-underline">
        Legal Services
      </a>
      <a routerLink="/"
         class="nav-link text-[0.92rem] font-bold text-slate-600 hover:text-blue-700 dark:text-slate-300 dark:hover:text-white transition-colors no-underline">
        About
      </a>
    </div>

    <!-- RIGHT: Actions / Utilities -->
    <div class="hidden md:flex items-center justify-end gap-4">
      <!-- Search Icon -->
      <a routerLink="/search" routerLinkActive="active" 
         class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors text-slate-500 dark:text-slate-300 flex items-center justify-center w-9 h-9" 
         title="Search">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </a>

      <!-- Notifications (Only if logged in) -->
      <ng-container *ngIf="(auth.isLoggedIn$ | async)">
        <a routerLink="/notifications" routerLinkActive="active" 
           class="relative p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors text-slate-500 dark:text-slate-300 flex items-center justify-center w-9 h-9" 
           title="Alerts">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
          <span *ngIf="notificationService.followedCount() as count" 
                class="absolute top-0 right-0 w-4 h-4 bg-blue-600 text-white text-[9px] font-bold rounded-full flex items-center justify-center shadow-sm">
            {{ count }}
          </span>
        </a>
      </ng-container>

      <!-- Theme Toggle -->
      <button class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors text-slate-500 dark:text-slate-300 flex items-center justify-center w-9 h-9" 
              (click)="themeService.toggleTheme()" aria-label="Toggle Theme">
        <svg *ngIf="themeService.isDarkMode()" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg *ngIf="!themeService.isDarkMode()" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>

      <div class="h-5 w-px bg-slate-200 dark:bg-slate-700 mx-1"></div>

      <!-- Auth State Actions -->
      <ng-container *ngIf="(auth.isLoggedIn$ | async); else guestActions">
        <a routerLink="/dashboard" routerLinkActive="active" 
           class="nav-link text-[0.92rem] font-bold text-slate-600 hover:text-blue-700 dark:text-slate-300 dark:hover:text-white transition-colors no-underline">
          Dashboard
        </a>
        <a routerLink="/profile" routerLinkActive="active" 
           class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors text-slate-500 dark:text-slate-300 flex items-center justify-center w-9 h-9" 
           title="Profile">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </a>
        <button class="nav-btn-outline" (click)="logout()">Sign Out</button>
      </ng-container>
      
      <ng-template #guestActions>
        <a routerLink="/login" class="nav-btn-outline">Login</a>
        <a routerLink="/register" class="nav-btn-solid">Get Started</a>
      </ng-template>
    </div>

    <!-- Mobile Hamburger Toggle -->
    <div class="flex items-center gap-3 md:hidden">
      <!-- Search & Theme Quick Toggles for Mobile -->
      <button class="p-2 rounded-full text-slate-500 dark:text-slate-300" (click)="themeService.toggleTheme()" aria-label="Toggle Theme">
        <svg *ngIf="themeService.isDarkMode()" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg *ngIf="!themeService.isDarkMode()" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>

      <button class="hamburger-btn" (click)="toggleMenu()" aria-label="Toggle Menu" [class.open]="menuOpen">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>

  <!-- Mobile Overlay Backdrop -->
  <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[999] transition-opacity duration-300 md:hidden"
       [class.opacity-100]="menuOpen" [class.pointer-events-auto]="menuOpen"
       [class.opacity-0]="!menuOpen" [class.pointer-events-none]="!menuOpen"
       (click)="menuOpen = false"></div>

  <!-- Mobile Drawer Menu (Slides in) -->
  <div class="fixed top-0 right-0 bottom-0 w-[280px] bg-white dark:bg-slate-900 shadow-2xl z-[1000] flex flex-col transition-transform duration-300 ease-in-out md:hidden"
       [class.translate-x-0]="menuOpen" [class.translate-x-full]="!menuOpen">
    
    <div class="p-6 pt-24 flex flex-col gap-5 h-full overflow-y-auto">
      
      <div class="flex items-center gap-3 pb-5 border-b border-slate-100 dark:border-slate-800">
        <div class="w-10 h-10 rounded-full bg-[#1e3a8a] dark:bg-blue-600 flex items-center justify-center text-white font-extrabold text-sm">
          LC
        </div>
        <div class="flex flex-col">
          <span class="text-base font-extrabold text-slate-900 dark:text-white leading-tight">LegalConnect</span>
        </div>
      </div>

      <!-- Links -->
      <a routerLink="/" class="mobile-nav-link" (click)="menuOpen=false">Home</a>
      <a routerLink="/lawyers" class="mobile-nav-link" (click)="menuOpen=false">Find Lawyers</a>
      <a routerLink="/laws" class="mobile-nav-link" (click)="menuOpen=false">Legal Services</a>
      <a routerLink="/search" class="mobile-nav-link" (click)="menuOpen=false">Search</a>

      <div class="h-px bg-slate-100 dark:bg-slate-800 my-2"></div>

      <ng-container *ngIf="(auth.isLoggedIn$ | async)">
        <a routerLink="/dashboard" class="mobile-nav-link" (click)="menuOpen=false">Dashboard</a>
        <a routerLink="/notifications" class="mobile-nav-link" (click)="menuOpen=false">Alerts</a>
        <a routerLink="/profile" class="mobile-nav-link" (click)="menuOpen=false">Profile</a>
        <button class="nav-btn-outline w-full text-center mt-4" (click)="logout()">Sign Out</button>
      </ng-container>

      <ng-container *ngIf="!(auth.isLoggedIn$ | async)">
        <a routerLink="/login" class="nav-btn-outline w-full text-center py-2.5" (click)="menuOpen=false">Login</a>
        <a routerLink="/register" class="nav-btn-solid w-full text-center py-2.5 mt-2" (click)="menuOpen=false">Get Started</a>
      </ng-container>
    </div>
  </div>
</nav>
