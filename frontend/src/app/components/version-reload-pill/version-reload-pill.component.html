<div *ngIf="announcementService.versionMismatch()"
  class="fixed bottom-20 right-4 sm:bottom-6 sm:right-6 z-40 flex items-center gap-3 p-3 pl-4 pr-2 bg-slate-900/95 border border-amber-500/40 rounded-full shadow-2xl backdrop-blur-md text-slate-100 animate-slide-up">
  <div class="flex items-center gap-2">
    <span class="relative flex h-3 w-3">
      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75"></span>
      <span class="relative inline-flex rounded-full h-3 w-3 bg-amber-500"></span>
    </span>
    <span class="text-xs font-semibold text-slate-200">
      New version <span class="text-amber-400 font-mono">v{{ announcementService.serverVersion() }}</span> available!
    </span>
  </div>

  <button (click)="reloadApp()"
    class="px-3.5 py-1.5 text-xs font-bold rounded-full bg-gradient-to-r from-amber-500 to-amber-600 text-slate-950 hover:from-amber-400 hover:to-amber-500 transition-all shadow-md active:scale-95 flex items-center gap-1 cursor-pointer"
    appTooltip="Refresh page to load the latest application version and features" tooltipPlacement="top">
    <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
    </svg>
    <span>Reload Update</span>
  </button>
</div>
