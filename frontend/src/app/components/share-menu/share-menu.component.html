<div class="relative block share-container w-full">
  <button (click)="toggleShareDropdown($event)" [appTooltip]="tooltipText" [tooltipPlacement]="tooltipPlacement"
    [class]="buttonClass" [ngClass]="{'active': showShareDropdown}">
    <ng-container *ngIf="label; else simpleIcon">
      <div class="flex items-center gap-3.5 text-left w-full">
        <div
          class="w-9 h-9 rounded-lg bg-indigo-500/10 dark:bg-indigo-500/20 text-indigo-500 shrink-0 flex items-center justify-center">
          <svg [class]="iconClass" [attr.fill]="showShareDropdown ? 'currentColor' : 'none'" stroke="currentColor"
            viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
          </svg>
        </div>
        <div class="flex flex-col gap-0.5">
          <span class="text-xs font-bold text-text-primary dark:text-white">{{ label }}</span>
          <span *ngIf="description"
            class="text-[10px] text-text-secondary dark:text-slate-400 font-normal leading-normal whitespace-normal">{{
            description }}</span>
        </div>
      </div>
    </ng-container>
    <ng-template #simpleIcon>
      <svg [class]="iconClass" [attr.fill]="showShareDropdown ? 'currentColor' : 'none'" stroke="currentColor"
        viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
      </svg>
    </ng-template>
  </button>

  <!-- ═══ DESKTOP: Premium Dropdown (hidden on mobile) ═══ -->
  <div #desktopDropdown *ngIf="showShareDropdown" [class.open-upwards]="openUpwards" [ngStyle]="dropdownStyles"
    class="share-desktop-dropdown bg-white/80 dark:bg-slate-900/85 backdrop-blur-xl border border-slate-200/50 dark:border-slate-800/50 rounded-2xl shadow-2xl p-2.5 flex-col gap-1 animate-scale-up hidden md:flex">
    <div class="text-[10px] font-black uppercase tracking-wider text-slate-400 dark:text-slate-500 px-2.5 py-1">Share
      Options
    </div>

    <!-- Custom Action (Primary) -->
    <ng-container *ngIf="customActionLabel">
      <button (click)="onCustomAction($event)"
        class="group w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-xs font-bold text-indigo-600 dark:text-amber-400 hover:bg-indigo-50/50 dark:hover:bg-amber-500/10 transition-all duration-200 border-none bg-transparent cursor-pointer text-left">
        <svg class="w-4 h-4 text-indigo-500 dark:text-amber-400 transition-transform group-hover:scale-110" fill="none"
          stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        <span>{{ customActionLabel }}</span>
      </button>
      <div class="h-px bg-slate-200/50 dark:bg-slate-800/50 my-1 mx-2"></div>
    </ng-container>

    <!-- Copy Link -->
    <button (click)="shareTo('copy')"
      class="group w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-xs font-semibold text-slate-600 dark:text-slate-300 hover:bg-slate-100/50 dark:hover:bg-white/5 hover:text-slate-900 dark:hover:text-white transition-all duration-150 border-none bg-transparent cursor-pointer text-left">
      <svg class="w-4 h-4 text-emerald-500 transition-transform group-hover:scale-110" fill="none" stroke="currentColor"
        viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
      </svg>
      <span>{{ copyLinkLabel }}</span>
    </button>

    <div class="h-px bg-slate-200/50 dark:bg-slate-800/50 my-1 mx-2"></div>

    <!-- Social Platforms -->
    <button *ngFor="let platform of platforms; trackBy: trackByPlatform" (click)="shareTo(platform.id)"
      class="group w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-xs font-semibold text-slate-600 dark:text-slate-300 hover:bg-slate-100/50 dark:hover:bg-white/5 hover:text-slate-900 dark:hover:text-white transition-all duration-150 border-none bg-transparent cursor-pointer text-left">
      <svg class="w-4 h-4 transition-transform group-hover:scale-110" [ngClass]="platform.desktopIconClass"
        [attr.fill]="platform.isStroke ? 'none' : 'currentColor'"
        [attr.stroke]="platform.isStroke ? 'currentColor' : 'none'" [attr.stroke-width]="platform.isStroke ? '2' : null"
        viewBox="0 0 24 24">
        <path [attr.d]="platform.svgPath" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      <span>{{ platform.name }}</span>
    </button>

    <!-- Native Share (Mobile) -->
    <ng-container *ngIf="hasNativeShare">
      <div class="h-px bg-slate-200/50 dark:bg-slate-800/50 my-1 mx-2"></div>
      <button (click)="shareTo('native')"
        class="group w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-xs font-semibold text-slate-600 dark:text-slate-300 hover:bg-slate-100/50 dark:hover:bg-white/5 hover:text-slate-900 dark:hover:text-white transition-all duration-150 border-none bg-transparent cursor-pointer text-left">
        <svg class="w-4 h-4 text-slate-500 transition-transform group-hover:scale-110" fill="none" stroke="currentColor"
          viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
        </svg>
        <span>More Options...</span>
      </button>
    </ng-container>
  </div>

  <!-- ═══ MOBILE: Full-Screen Bottom Sheet (hidden on desktop) ═══ -->
  <div #mobileSheet *ngIf="showShareDropdown" class="share-mobile-sheet md:hidden">
    <!-- Backdrop -->
    <div class="fixed inset-0 z-[9998] bg-black/50 backdrop-blur-sm" (click)="closeShareDropdown()"></div>

    <!-- Sheet -->
    <div
      class="fixed bottom-0 left-0 right-0 z-[9999] bg-white dark:bg-[hsl(222,47%,11%)] rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.15)] dark:shadow-[0_-10px_40px_rgba(0,0,0,0.5)] animate-share-sheet-up"
      (click)="$event.stopPropagation()">

      <!-- Drag Handle -->
      <div class="flex justify-center pt-2.5 pb-1">
        <div class="w-10 h-1 rounded-full bg-slate-300 dark:bg-white/15"></div>
      </div>

      <!-- Sheet Header -->
      <div class="px-4 pb-2 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <div
            class="w-6 h-6 rounded-full bg-gradient-to-br from-[hsl(35,92%,47%)] to-[hsl(35,92%,37%)] flex items-center justify-center">
            <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"
              stroke-width="2.2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
            </svg>
          </div>
          <div>
            <h3 class="text-xs font-bold text-slate-800 dark:text-white">Share</h3>
            <p class="text-[10px] text-slate-400 dark:text-slate-500 font-medium">Choose where to share</p>
          </div>
        </div>
        <button (click)="closeShareDropdown()"
          class="w-6 h-6 rounded-full bg-slate-100 dark:bg-white/8 flex items-center justify-center border-none cursor-pointer text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-white/15 transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Social Grid (All platform options in a single grid) -->
      <div class="px-4 pb-2.5">
        <span
          class="text-[9px] font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500 px-1 mb-1.5 block">Share
          via</span>
        <div class="grid grid-cols-4 gap-y-2 gap-x-1">

          <!-- Custom Action (Mobile) - First Position -->
          <button *ngIf="customActionLabel" (click)="onCustomAction($event)"
            class="share-grid-btn flex flex-col items-center gap-1 py-1.5 px-0.5 rounded-2xl border-none cursor-pointer bg-transparent transition-all active:scale-95 hover:bg-indigo-50 dark:hover:bg-indigo-950/20">
            <div
              class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-indigo-700 flex items-center justify-center shadow-sm shadow-indigo-500/25">
              <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
              </svg>
            </div>
            <span class="text-[9.5px] font-semibold text-slate-600 dark:text-slate-300 truncate w-full text-center">{{
              customActionLabel }}</span>
          </button>

          <!-- Social Platforms -->
          <button *ngFor="let platform of platforms; trackBy: trackByPlatform" (click)="shareTo(platform.id)"
            class="share-grid-btn flex flex-col items-center gap-1 py-1.5 px-0.5 rounded-2xl border-none cursor-pointer bg-transparent transition-all active:scale-95"
            [ngClass]="platform.mobileHoverClass">
            <div class="w-10 h-10 rounded-full flex items-center justify-center shadow-sm"
              [ngClass]="platform.mobileBgClass">
              <svg class="w-5 h-5" [ngClass]="platform.mobileIconClass"
                [attr.fill]="platform.isStroke ? 'none' : 'currentColor'"
                [attr.stroke]="platform.isStroke ? 'currentColor' : 'none'"
                [attr.stroke-width]="platform.isStroke ? '2' : null" viewBox="0 0 24 24">
                <path [attr.d]="platform.svgPath" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </div>
            <span class="text-[9.5px] font-semibold text-slate-600 dark:text-slate-300">{{ platform.name }}</span>
          </button>

          <!-- Native Share (More) -->
          <button *ngIf="hasNativeShare" (click)="shareTo('native')"
            class="share-grid-btn flex flex-col items-center gap-1 py-1.5 px-0.5 rounded-2xl border-none cursor-pointer bg-transparent transition-all active:scale-95 hover:bg-indigo-50 dark:hover:bg-indigo-950/20">
            <div
              class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-400 to-indigo-600 flex items-center justify-center shadow-sm shadow-indigo-500/25">
              <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
              </svg>
            </div>
            <span class="text-[9.5px] font-semibold text-slate-600 dark:text-slate-300">More</span>
          </button>
        </div>
      </div>

      <!-- Link Preview Box -->
      <div
        class="bg-slate-50 dark:bg-white/[0.02] p-3 border-t border-slate-100 dark:border-white/5 flex items-center justify-between gap-4">
        <div class="min-w-0 flex-1">
          <p class="text-[8.5px] font-extrabold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-0.5">
            Direct Link</p>
          <p class="text-xs font-semibold text-slate-600 dark:text-slate-300 truncate">{{ getDisplayUrl() }}</p>
        </div>
        <button (click)="shareTo('copy')"
          class="shrink-0 px-2.5 py-1 bg-white dark:bg-white/5 text-amber-600 dark:text-amber-400 text-xs font-bold rounded-lg shadow-sm border border-amber-200/40 dark:border-amber-500/15 hover:bg-amber-600 hover:text-white dark:hover:bg-amber-500 dark:hover:text-white transition-all active:scale-95 cursor-pointer">
          Copy
        </button>
      </div>

      <!-- Safe area spacer (notch phones) -->
      <div class="h-[env(safe-area-inset-bottom,6px)]"></div>
    </div>
  </div>
</div>
