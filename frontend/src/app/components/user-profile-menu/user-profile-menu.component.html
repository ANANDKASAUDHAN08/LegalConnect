<div class="relative group py-2">
  <!-- Avatar Trigger -->
  <div class="w-9 h-9 rounded-full bg-gradient-to-tr from-blue-600 to-indigo-600 text-white font-extrabold flex items-center justify-center cursor-pointer shadow-md select-none border-2 border-white dark:border-slate-900 group-hover:scale-105 transition-transform duration-200">
    {{ (currentUser?.fullName || 'U')[0] | uppercase }}
  </div>

  <!-- Dropdown Card Container -->
  <div class="absolute right-0 top-full mt-1 w-64 bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800/80 rounded-2xl shadow-xl dark:shadow-[0_10px_30px_rgba(0,0,0,0.4)] opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 ease-out transform translate-y-2 group-hover:translate-y-0 z-50 p-4 flex flex-col gap-3">

    <!-- User Info Header -->
    <div class="flex items-center gap-3 pb-2.5 border-b border-slate-100 dark:border-slate-800/60">
      <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-500 text-white font-black flex items-center justify-center text-sm shadow-inner">
        {{ (currentUser?.fullName || 'U')[0] | uppercase }}
      </div>
      <div class="flex flex-col min-w-0">
        <span class="text-[0.88rem] font-bold text-slate-800 dark:text-slate-100 truncate leading-snug">
          {{ currentUser?.fullName }}
        </span>
        <span class="text-[0.7rem] text-slate-400 truncate leading-none mt-0.5">
          {{ currentUser?.email }}
        </span>
      </div>
    </div>

    <!-- Navigation Links -->
    <div class="flex flex-col gap-1">
      <!-- Client options -->
      <ng-container *ngIf="currentUser?.role !== 'Lawyer'">
        <a routerLink="/client/portal" [queryParams]="{tab: 'bookmarks'}"
          class="profile-dropdown-link flex items-center gap-3 px-2.5 py-2 rounded-xl text-slate-600 dark:text-slate-350 no-underline transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 hover:text-blue-600 dark:hover:text-white">
          <span class="text-base">🔖</span>
          <span class="text-[0.82rem] font-semibold">My Saved Laws</span>
        </a>
        <a routerLink="/client/portal" [queryParams]="{tab: 'inquiries'}"
          class="profile-dropdown-link flex items-center gap-3 px-2.5 py-2 rounded-xl text-slate-600 dark:text-slate-350 no-underline transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 hover:text-blue-600 dark:hover:text-white">
          <span class="text-base">✉️</span>
          <span class="text-[0.82rem] font-semibold">Sent Inquiries</span>
        </a>
      </ng-container>
      
      <!-- Lawyer options -->
      <ng-container *ngIf="currentUser?.role === 'Lawyer'">
        <a routerLink="/lawyer/workstation"
          class="profile-dropdown-link flex items-center gap-3 px-2.5 py-2 rounded-xl text-slate-600 dark:text-slate-350 no-underline transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 hover:text-blue-600 dark:hover:text-white">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="9"></rect>
            <rect x="14" y="3" width="7" height="5"></rect>
            <rect x="14" y="12" width="7" height="9"></rect>
            <rect x="3" y="16" width="7" height="5"></rect>
          </svg>
          <span class="text-[0.82rem] font-semibold">Advocate Workspace</span>
        </a>
      </ng-container>

      <!-- Profile & Settings (Shared) -->
      <a routerLink="/profile"
        class="profile-dropdown-link flex items-center gap-3 px-2.5 py-2 rounded-xl text-slate-600 dark:text-slate-350 no-underline transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 hover:text-blue-600 dark:hover:text-white">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
        <span class="text-[0.82rem] font-semibold">Account Profile</span>
      </a>
      
      <!-- Logout Button (Common) -->
      <button (click)="logout.emit()"
        class="profile-dropdown-link flex w-full items-center gap-3 px-2.5 py-2 rounded-xl text-rose-500 hover:bg-rose-50/50 dark:hover:bg-rose-950/20 no-underline transition-colors bg-transparent border-0 cursor-pointer text-left">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        <span class="text-[0.82rem] font-bold">Sign Out</span>
      </button>
    </div>
  </div>
</div>
